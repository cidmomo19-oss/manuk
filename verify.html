<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="googlebot" content="noindex, nofollow">
    
    <title>Proses Verifikasi</title>
    
    <!-- Menggunakan Font yang sama dengan index.html -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { -webkit-tap-highlight-color: transparent !important; outline: none !important; box-sizing: border-box; }
        
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            -webkit-user-select: none; user-select: none; 
            background: #f6f8fa; 
            background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, transparent 70%);
            font-family: 'Inter', sans-serif; 
            color: #0f172a;
        }

        /* Card yang serasi dengan index.html */
        .s4u-card { 
            width: 90%; max-width: 400px; 
            background: #ffffff; padding: 40px 32px; 
            border-radius: 28px; 
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.02);
            border: 1px solid rgba(226, 232, 240, 0.8);
            text-align: center; 
            animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }

        /* Ikon modern minimalis */
        .s4u-header-icon { 
            width: 56px; height: 56px; 
            background: #0f172a; 
            border-radius: 18px; 
            display: inline-flex; justify-content: center; align-items: center; 
            margin-bottom: 24px; 
            box-shadow: 0 10px 20px -5px rgba(15, 23, 42, 0.3); 
        }
        .s4u-header-icon svg { width: 26px; height: 26px; fill: none; stroke: #ffffff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        
        h2 { font-family: 'Outfit', sans-serif; margin: 0 0 8px 0; color: #0f172a; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        p.subtitle { color: #64748b; font-size: 14.5px; margin-bottom: 32px; line-height: 1.5; font-weight: 400; }
        p.subtitle b { color: #0f172a; font-weight: 600; }

        .task-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
        
        /* Tombol Tugas 5 Detik */
        .btn-task { 
            display: flex; align-items: center; justify-content: space-between; 
            background: #f1f5f9; color: #0f172a; 
            padding: 16px 20px; border-radius: 16px; 
            font-weight: 600; font-size: 15px; 
            transition: all 0.3s ease; cursor: pointer; 
            border: 2px solid transparent; width: 100%; font-family: inherit; 
        }
        
        .btn-task:hover:not(.checking):not(.success):not(.failed) { 
            background: #e2e8f0; transform: translateY(-2px); 
        }
        .btn-task svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; flex-shrink: 0; }
        
        /* Status Tombol Tugas */
        .btn-task.checking { background: #fffbeb; color: #d97706; border-color: #fde68a; pointer-events: none; }
        .btn-task.failed { background: #fef2f2; color: #dc2626; border-color: #fecaca; animation: shake 0.4s ease-in-out; pointer-events: none; }
        .btn-task.success { background: #f0fdf4; color: #166534; border-color: #bbf7d0; pointer-events: none; }

        /* Tombol Dapatkan Link */
        .btn-unlock { 
            background: #e2e8f0; color: #94a3b8; 
            width: 100%; padding: 16px; 
            border: none; border-radius: 16px; 
            font-size: 16px; font-weight: 600; 
            cursor: not-allowed; transition: all 0.4s ease; font-family: inherit; 
        }
        .btn-unlock.active { 
            background: #0f172a; color: white; cursor: pointer; 
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.25); 
            animation: pulseBtn 2s infinite; 
        }
        .btn-unlock.active:hover { background: #334155; transform: translateY(-2px); }
        .btn-unlock.active:active { transform: translateY(0); }
        
        @keyframes pulseBtn { 0% { box-shadow: 0 0 0 0 rgba(15, 23, 42, 0.2); } 70% { box-shadow: 0 0 0 10px rgba(15, 23, 42, 0); } 100% { box-shadow: 0 0 0 0 rgba(15, 23, 42, 0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .icon-spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="s4u-card" id="page-task" style="display: none;">
    <div class="s4u-header-icon">
        <svg viewBox="0 0 24 24">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <path d="M9 12l2 2 4-4"/>
        </svg>
    </div>
    <h2>Verifikasi Akses</h2>
    <p class="subtitle">Buka tab di bawah dan tunggu <b>5 detik</b>, lalu kembali ke halaman ini untuk membuka link asli.</p>

    <div class="task-list">
        <button class="btn-task" id="btnTask" onclick="startTask()">
            <span id="textTask">Klik disini (Tunggu 5 Detik)</span>
            <svg id="iconTask" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </button>
    </div>

    <button class="btn-unlock" id="btnUnlock" onclick="unlockTarget()" disabled>Dapatkan Link Asli</button>
</div>

<script>
    // PERBAIKAN FATAL: Mencocokkan nama variabel yang disamarkan dari index.html
    const sessionKey = sessionStorage.getItem('_vx');
    const sessionId = sessionStorage.getItem('_id');
    
    // Jika tidak ada akses, tendang balik ke index
    if (!sessionKey || !sessionId || navigator.webdriver) {
        window.location.replace('index.html');
    } else {
        document.getElementById('page-task').style.display = 'block';
    }

    // URL TARGET (Iklan)
    const _t1 = "aHR0cHM6Ly9jb25kdWN0aXZlYnJlZWRzLmNvbS9ibWF5ZTIyN2ppP2tleT0yMTE0M2Y2MzUyZWRmNjVhNmI2NDYxNWU5YmIzN2JiOQ==";
    const _t2 = "aHR0cHM6Ly9vbWcxMC5jb20vNC8xMDM5MDg2MA==";

    const btnTask = document.getElementById('btnTask');
    const textTask = document.getElementById('textTask');
    const iconTask = document.getElementById('iconTask');
    const btnUnlock = document.getElementById('btnUnlock');

    window.addEventListener("pageshow", () => {
        if (sessionStorage.getItem('taskDone') === 'true') {
            setTaskSuccess();
        } else if (localStorage.getItem('isProcessingTask') === 'true') {
            checkTaskStatus();
        }
    });

    function startTask() {
        if(localStorage.getItem('isProcessingTask') === 'true') return; 

        let seq = parseInt(localStorage.getItem('taskSeq') || 0);
        let adIndex = seq % 2; 
        
        sessionStorage.setItem('lastAdUsed', adIndex);
        localStorage.setItem('taskSeq', seq + 1);
        
        let dest = (adIndex === 0) ? atob(_t1) : atob(_t2);

        // Membuka tab baru yang berisi loading lalu lari ke URL Iklan
        const newTab = window.open('about:blank', '_blank');
        const redirectHTML = `
            <!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Memuat...</title><style>body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #fff; margin:0;} .loader { border: 3px solid #f1f5f9; border-top: 3px solid #0f172a; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; } @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style></head><body><div class="loader"></div><script>setTimeout(function() { window.location.replace("${dest}"); }, 800);<\/script></body></html>
        `;
        
        if (newTab) {
            newTab.document.write(redirectHTML);
            newTab.document.close();
        } else {
            // Fallback jika diblokir pop-up blocker
            window.location.href = dest;
        }

        localStorage.setItem('taskStart', Date.now());
        localStorage.setItem('isProcessingTask', 'true');

        btnTask.className = 'btn-task checking';
        textTask.innerText = "Menunggu kamu kembali...";
        iconTask.classList.add('icon-spin');
        iconTask.innerHTML = '<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>';
    }

    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === 'visible') {
            checkTaskStatus();
        }
    });

    function checkTaskStatus() {
        if (localStorage.getItem('isProcessingTask') !== 'true') return;

        let startTime = parseInt(localStorage.getItem('taskStart') || 0);
        let timeSpent = Date.now() - startTime;
        
        localStorage.removeItem('isProcessingTask'); 
        iconTask.classList.remove('icon-spin');

        if (timeSpent < 5000) {
            btnTask.className = 'btn-task failed';
            textTask.innerText = "Gagal, belum 5 detik!";
            iconTask.innerHTML = '<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>';
            
            setTimeout(() => {
                btnTask.className = 'btn-task';
                textTask.innerText = "Klik disini (Tunggu 5 Detik)";
                iconTask.innerHTML = '<line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline>';
            }, 3000);

        } else {
            setTaskSuccess();
        }
    }

    function setTaskSuccess() {
        btnTask.className = 'btn-task success';
        textTask.innerText = "Berhasil! Silahkan lanjut.";
        iconTask.innerHTML = '<path d="M22 11.08V12a10 10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>';
        
        btnUnlock.disabled = false;
        btnUnlock.classList.add('active');
        sessionStorage.setItem('taskDone', 'true');
    }

    async function unlockTarget() {
        btnUnlock.innerText = "Membuka link...";
        btnUnlock.disabled = true;

        // BUKA TAB KOSONG SEBELUM FETCH AGAR TIDAK KENA POP-UP BLOCKER
        const realLinkTab = window.open('about:blank', '_blank');

        try {
            // Tembak worker untuk ambil link asli
            const res = await fetch(`/api/get/${sessionId}/${encodeURIComponent(sessionKey)}?t=${new Date().getTime()}`);
            
            if (res.ok) {
                const data = await res.json();
                
                // Cek iklan mana yang dipakai sebelumnya untuk disilang
                const lastAd = sessionStorage.getItem('lastAdUsed');
                let unlockAdDest = (lastAd === "0") ? atob(_t2) : atob(_t1);

                sessionStorage.clear(); 
                
                if (realLinkTab) {
                    // 1. Tab baru diarahkan ke Link Asli (Video/Target)
                    realLinkTab.location.replace(data.url);
                    // 2. Tab lama diarahkan ke Iklan Silangan
                    window.location.replace(unlockAdDest);
                } else {
                    // Fallback jika browser memaksa blokir tab baru, langsung bawa ke target asli
                    window.location.replace(data.url);
                }
                
            } else {
                if(realLinkTab) realLinkTab.close();
                alert("Sesi akses sudah tidak valid. Silahkan ulangi.");
                window.location.replace('index.html');
            }
        } catch (err) {
            if(realLinkTab) realLinkTab.close();
            alert("Gagal memuat link. Periksa koneksi internetmu.");
            btnUnlock.innerText = "Dapatkan Link Asli";
            btnUnlock.disabled = false;
        }
    }
</script>
</body>
</html>
