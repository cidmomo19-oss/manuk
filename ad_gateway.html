<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Tunggu Sebentar...</title>
    
    <!-- DNS-PREFETCH DAN PRECONNECT UNTUK IKLAN -->
    <link rel="dns-prefetch" href="https://conductivebreeds.com">
    <link rel="preconnect" href="https://conductivebreeds.com">
    <link rel="dns-prefetch" href="https://omg10.com">
    <link rel="preconnect" href="https://omg10.com">

    <!-- Font Poppins untuk halaman Modern -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            -webkit-tap-highlight-color: transparent !important; 
            outline: none !important;
            user-select: none;
        }
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Poppins', sans-serif; color: #333;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            text-align: center;
        }
        .loading-container {
            background: rgba(255, 255, 255, 0.95); padding: 40px 25px; border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); 
            border: 1px solid rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            animation: slideUpFade 0.5s ease-out forwards;
            max-width: 350px;
            width: 90%;
        }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }

        .spinner {
            border: 4px solid rgba(0, 123, 255, 0.2);
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { margin: 0 0 10px 0; color: #2d3436; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        p { color: #636e72; font-size: 14px; line-height: 1.6; font-weight: 500; }
        p b { color: #007bff; }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="spinner"></div>
        <h2>Memuat Iklan...</h2>
        <p>Iklan akan terbuka di tab baru. Kembali ke halaman ini setelah <b>5 detik</b>.</p>
        <p style="margin-top:20px;">Jangan tutup halaman ini.</p>
    </div>

    <script>
        const MIN_DURATION = 5000; // 5 detik
        let startTime = 0;
        let adLink = '';
        let originalPageUrl = ''; // URL halaman utama kita
        let finalDestinationUrl = ''; // URL tujuan akhir (link asli)

        // Dapatkan URL halaman utama dari parameter atau fallback
        const urlParams = new URLSearchParams(window.location.search);
        originalPageUrl = urlParams.get('return_to') || '/'; // Default ke root jika tidak ada
        
        window.addEventListener("pageshow", () => {
            adLink = sessionStorage.getItem('adLinkToOpen');
            startTime = parseInt(sessionStorage.getItem('adMissionStartTime'));
            finalDestinationUrl = sessionStorage.getItem('finalDestinationUrl');

            // Jika tidak ada data di sessionStorage, berarti ada anomali atau user langsung ke sini
            if (!adLink || !startTime || !finalDestinationUrl) {
                window.location.replace(originalPageUrl); // Kembali ke halaman utama
                return;
            }
            
            // Buka iklan di tab baru
            const a = document.createElement('a');
            a.href = adLink;
            a.target = '_blank';
            a.rel = 'noreferrer noopener';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            // Bersihkan sessionStorage agar tidak terpicu lagi jika ada reload tak terduga
            sessionStorage.removeItem('adLinkToOpen');
            sessionStorage.removeItem('adMissionStartTime');
            // finalDestinationUrl akan dibersihkan saat berhasil atau gagal total
        });

        // ==========================================
        // Pendeteksi user kembali ke halaman ini (dari tab iklan)
        // ==========================================
        let userHasLeft = false;

        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                userHasLeft = true;
            } else { // User kembali ke halaman ini
                if (userHasLeft && startTime !== 0) {
                    checkMissionStatus();
                }
            }
        });

        window.addEventListener("blur", () => { // User pindah ke tab/aplikasi lain
            userHasLeft = true;
        });

        window.addEventListener("focus", () => { // User kembali fokus ke tab ini
            if (userHasLeft && startTime !== 0) {
                checkMissionStatus();
            }
        });

        function checkMissionStatus() {
            if (startTime === 0) return; // Misi belum dimulai atau sudah selesai

            const duration = Date.now() - startTime;
            sessionStorage.removeItem('adMissionStartTime'); // Reset untuk mencegah double-check
            startTime = 0; // Pastikan tidak ada pengecekan ulang

            if (duration >= MIN_DURATION) {
                // SUKSES: Redirect ke tujuan akhir
                sessionStorage.removeItem('finalDestinationUrl'); // Bersihkan URL tujuan
                window.location.replace(finalDestinationUrl);
            } else {
                // GAGAL: Redirect balik ke halaman utama dengan status gagal
                window.location.replace(originalPageUrl + '?status=failed');
            }
        }
    </script>
</body>
</html>
