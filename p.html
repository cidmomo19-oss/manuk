<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Gateway Secure</title>
    
    <!-- DNS-PREFETCH DAN PRECONNECT UNTUK IKLAN -->
    <link rel="dns-prefetch" href="https://conductivebreeds.com">
    <link rel="preconnect" href="https://conductivebreeds.com">
    <link rel="dns-prefetch" href="https://omg10.com">
    <link rel="preconnect" href="https://omg10.com">
    
    <!-- Font Poppins (Sesuai Desain Baru) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* === RESET & COMMON === */
        * {
            -webkit-tap-highlight-color: transparent !important; 
            outline: none !important;
            box-sizing: border-box;
        }

        body { 
            margin: 0; padding: 20px; width: 100vw; height: 100vh; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; 
        }

        input {
            -webkit-user-select: auto; -moz-user-select: auto; -ms-user-select: auto; user-select: auto;
        }

        html { transition: background 0.5s ease; height: 100%; width: 100%; }
        
        /* === TEMA HALAMAN === */
        html.theme-pw { background-color: #ffffff; }
        /* Background Baru Sesuai Gambar (dengan efek glow di pojok) */
        html.theme-ads { 
            background-color: #f8f9fa;
            background-image: radial-gradient(circle at 95% 95%, hsla(20, 100%, 85%, 0.3) 0%, transparent 40%);
        }

        body.theme-pw { font-family: "Courier New", Courier, monospace; color: #000000; }
        body.theme-ads { font-family: 'Poppins', sans-serif; }

        /* === CONTAINER HALAMAN === */
        #page-password { 
            display: block; width: 100%; max-width: 350px;
            text-align: center; 
            transition: transform 0.3s ease-out; 
        }
        #page-iklan { display: none; width: 100%; max-width: 420px; }
        #page-password.keyboard-active { transform: translateY(-25vh); }

        /* === CSS HALAMAN PASSWORD (Tidak Berubah) === */
        h2.minimal-title { margin-bottom: 5px; font-size: 22px; text-transform: lowercase; cursor: default; }
        .input-line { 
            width: 100%; border: none; border-bottom: 2px solid #000; background: transparent; 
            font-size: 20px; padding: 10px 0; margin: 15px 0; text-align: center; font-family: inherit; letter-spacing: 3px;
        }
        button.btn-minimal { 
            background: #000; color: #fff; border: 2px solid #000; padding: 14px 20px; font-size: 16px; 
            cursor: pointer; font-family: inherit; width: 100%; text-transform: uppercase; font-weight: bold; transition: 0.2s;
        }
        button.btn-minimal:disabled { background: #fff; color: #aaa; border-color: #aaa; cursor: not-allowed; }
        
        .btn-wa-channel {
            display: flex; justify-content: center; align-items: center; gap: 12px; width: 100%;
            margin-top: 15px; padding: 14px 20px; font-family: system-ui, sans-serif; font-size: 16px; font-weight: 600;
            color: #ffffff; text-decoration: none; background: linear-gradient(45deg, #25D366, #128C7E);
            border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); 
            transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
        }
        .btn-wa-channel:hover { transform: translateY(-3px); box-shadow: 0 7px 20px rgba(0, 0, 0, 0.15); }
        .btn-wa-channel svg { width: 22px; height: 22px; fill: #ffffff; }
        
        .error { color: #d32f2f; margin-top: 15px; display: none; font-size: 14px; font-family: system-ui, sans-serif; line-height: 1.4; font-weight: 600; }
        
        /* ============================================== */
        /* === CSS HALAMAN IKLAN BARU (SESUAI GAMBAR) === */
        /* ============================================== */
        .s4u-card {
            background: #ffffff; padding: 40px; border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08); text-align: center;
            animation: slideUpFade 0.6s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }
        
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }

        .s4u-header-icon {
            display: inline-flex; justify-content: center; align-items: center;
            width: 70px; height: 70px; background: linear-gradient(135deg, #FFF0E6, #FFE0CC);
            border-radius: 50%; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(255, 126, 95, 0.2);
        }
        .s4u-header-icon svg { width: 32px; height: 32px; fill: #FF7E5F; }
        
        .s4u-card h2 { margin: 0 0 12px 0; color: #343a40; font-size: 24px; font-weight: 700; cursor: default; }
        .s4u-card p.subtitle { color: #6c757d; font-size: 15px; margin: 0 auto 35px auto; line-height: 1.6; font-weight: 400; max-width: 300px; cursor: default; }
        .s4u-card p.subtitle b { color: #FF6B6B; font-weight: 600;}

        .task-list { display: flex; flex-direction: column; gap: 15px; }
        
        .btn-task, .btn-unlock {
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 18px; border: none; border-radius: 16px;
            font-size: 15px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: all 0.25s ease;
        }
        
        /* Tombol Utama (Orange) */
        .btn-task {
            background: linear-gradient(135deg, #FF8C69, #FF6B6B); color: white; 
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.35);
        }
        .btn-task:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(255, 107, 107, 0.45); }
        .btn-task svg { width: 22px; height: 22px; fill: white; flex-shrink: 0; margin-left: auto; }
        .btn-task span { flex-grow: 1; text-align: center; transform: translateX(-11px); }

        /* Tombol Kedua (Abu-abu/Disabled) */
        .btn-unlock {
            background: #e9ecef; color: #adb5bd; cursor: not-allowed;
        }

        /* State Tombol: Checking/Loading */
        .btn-task.checking { background: #f39c12; box-shadow: 0 8px 20px rgba(243, 156, 18, 0.3); pointer-events: none; }
        .btn-task.checking span { transform: translateX(0); } /* Center text when icon hidden */

        /* State Tombol: Gagal */
        .btn-task.failed { background: #ff4757; box-shadow: 0 8px 20px rgba(255, 71, 87, 0.3); animation: shake 0.4s ease-in-out; pointer-events: none; }
        .btn-task.failed span { transform: translateX(0); } /* Center text when icon hidden */

        /* State Tombol: Sukses */
        .btn-task.success { background: linear-gradient(135deg, #00b09b, #96c93d); box-shadow: 0 8px 20px rgba(0, 176, 155, 0.3); pointer-events: none; }
        .btn-task.success span { transform: translateX(0); } /* Center text when icon hidden */
        
        /* State Tombol Unlock: Aktif (Biru) */
        .btn-unlock.active { 
            background: #0984e3; color: white; cursor: pointer; 
            box-shadow: 0 8px 20px rgba(9, 132, 227, 0.4); animation: pulseBtn 2s infinite; 
        }
        .btn-unlock.active:hover { background: #74b9ff; transform: translateY(-2px); }
        
        @keyframes pulseBtn { 0% { box-shadow: 0 0 0 0 rgba(9, 132, 227, 0.4); } 70% { box-shadow: 0 0 0 12px rgba(9, 132, 227, 0); } 100% { box-shadow: 0 0 0 0 rgba(9, 132, 227, 0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body class="theme-pw">

<div id="page-password">
    <h2 class="minimal-title">masukkan password</h2>
    <input type="text" id="passwordInput" class="input-line" autocomplete="off">
    <button id="btnUser" class="btn-minimal">Lanjut</button>

    <a href="https://whatsapp.com/channel/0029Vb7ppPyCBtxEWJ5f1I0V" target="_blank" class="btn-wa-channel"><svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>Join Saluran WhatsApp</a>
    <div id="errorMsg" class="error">password tidak valid.</div>
</div>

<div id="page-iklan" class="s4u-card">
    <div class="s4u-header-icon">
        <svg viewBox="0 0 24 24"><path d="M20,3H4v10c0,2.21,1.79,4,4,4h6c2.21,0,4-1.79,4-4v-3h2c1.11,0,2-0.9,2-2V5C22,3.9,21.11,3,20,3z M20,8h-2V5h2V8z M4,19h16v2H4V19z"/></svg>
    </div>
    <h2>Bantu admin beli jajan ☕</h2>
    <p class="subtitle">Klik tombol di bawah, iklan akan terbuka di tab baru. Anteng disana selama <b>5 detik</b>, lalu kembali ke halaman ini.</p>

    <div class="task-list">
        <button class="btn-task" id="btnIklan" onclick="bukaIklan()">
            <span id="textIklan">Klik disini (Wajib 5 Detik)</span>
            <svg id="iconIklan" viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
        </button>
        <button class="btn-unlock" id="btnUnlock" onclick="bukaLinkAsli()" disabled>Dapatkan Link Asli</button>
    </div>
</div>

<script>
    const linkIklan1 = "https://conductivebreeds.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9";
    const linkIklan2 = "https://omg10.com/4/10390860";
    let targetUrlAsli = ""; 

    let waktuMulaiIklan = 0;
    let sedangMembukaIklan = false;

    const passwordInput = document.getElementById("passwordInput");
    const btnUser = document.getElementById("btnUser");
    const errorMsg = document.getElementById("errorMsg");
    const pagePassword = document.getElementById("page-password");
    const pageIklan = document.getElementById("page-iklan");
    const btnIklan = document.getElementById('btnIklan');
    const textIklan = document.getElementById('textIklan');
    const iconIklan = document.getElementById('iconIklan');
    const btnUnlock = document.getElementById('btnUnlock');

    window.addEventListener("pageshow", () => {
        const urlTersimpan = sessionStorage.getItem('urlAsliDisimpan');
        if (urlTersimpan) {
            targetUrlAsli = urlTersimpan;
            tampilkanHalamanIklan();
        } else {
            tampilkanHalamanPassword();
        }
    });

    async function verifikasiPassword() {
        const password = passwordInput.value.trim();
        if (!password) return;
        errorMsg.style.display = "none";
        if (["ABC", "ABCD", "BALON"].includes(password.toUpperCase())) {
            gagalVerifikasi("⚠️ Password itu hanyalah contoh, password asli ada di dalam video.");
            return;
        }
        btnUser.innerText = "memeriksa...";
        btnUser.disabled = true;
        try {
            const res = await fetch(`/api/get/${password}?t=${new Date().getTime()}`, { headers: { 'Cache-Control': 'no-cache' } });
            if (res.ok) {
                const data = await res.json();
                targetUrlAsli = data.url;
                sessionStorage.setItem('urlAsliDisimpan', targetUrlAsli);
                tampilkanHalamanIklan();
            } else {
                gagalVerifikasi("password tidak valid.");
            }
        } catch (err) {
            gagalVerifikasi("error jaringan.");
        }
    }

    function gagalVerifikasi(pesan) {
        errorMsg.innerText = pesan;
        errorMsg.style.display = "block";
        btnUser.innerText = "Lanjut";
        btnUser.disabled = false;
        passwordInput.value = "";
        passwordInput.focus();
    }

    function tampilkanHalamanPassword() {
        document.documentElement.className = "theme-pw";
        document.body.className = "theme-pw";
        pageIklan.style.display = "none";
        pagePassword.style.display = "block";
        btnUser.onclick = verifikasiPassword;
        passwordInput.focus();
    }

    function tampilkanHalamanIklan() {
        document.documentElement.className = "theme-ads";
        document.body.className = "theme-ads";
        pagePassword.style.display = "none";
        pageIklan.style.display = "block";
    }
    
    passwordInput.addEventListener("keypress", (e) => { if (e.key === "Enter") verifikasiPassword(); });
    passwordInput.addEventListener('focus', () => pagePassword.classList.add('keyboard-active'));
    passwordInput.addEventListener('blur', () => pagePassword.classList.remove('keyboard-active'));

    function bukaIklan() {
        if(sedangMembukaIklan) return; 

        let urutan = parseInt(localStorage.getItem('urutanIklanMisi') || 0);
        let linkTarget = (urutan % 2 === 0) ? linkIklan1 : linkIklan2;
        localStorage.setItem('urutanIklanMisi', urutan + 1);

        const newTab = window.open('about:blank', '_blank');
        const redirectHTML = `
            <!DOCTYPE html><html><head><title>Mengalihkan...</title><style>body{display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}.loader{border:4px solid #f3f3f3;border-top:4px solid #FF8C69;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><div class="loader"></div><script>setTimeout(function(){window.location.replace("${linkTarget}");},500);<\/script></body></html>`;
        newTab.document.write(redirectHTML);
        newTab.document.close();

        waktuMulaiIklan = Date.now();
        sedangMembukaIklan = true;

        btnIklan.className = 'btn-task checking';
        textIklan.innerText = "Menunggu kamu kembali...";
        iconIklan.style.display = 'none'; // Sembunyikan panah
    }

    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === 'visible' && sedangMembukaIklan) {
            
            let waktuDihabiskan = Date.now() - waktuMulaiIklan;
            sedangMembukaIklan = false; 

            if (waktuDihabiskan < 5000) {
                // GAGAL
                btnIklan.className = 'btn-task failed';
                textIklan.innerText = "Yah belum 5 detik, diulang yuk!";
                
                setTimeout(() => {
                    btnIklan.className = 'btn-task';
                    textIklan.innerText = "Klik disini (Wajib 5 Detik)";
                    iconIklan.style.display = 'block'; // Tampilkan lagi panah
                }, 3000);

            } else {
                // SUKSES
                btnIklan.className = 'btn-task success';
                textIklan.innerText = "Terima kasih banyak! ☕";
                
                btnUnlock.disabled = false;
                btnUnlock.classList.add('active');
            }
        }
    });

    function bukaLinkAsli() {
        if (targetUrlAsli) {
            sessionStorage.removeItem('urlAsliDisimpan');
            window.location.replace(targetUrlAsli);
        }
    }
</script>
</body>
</html>
