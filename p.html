<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Secure Gateway</title>
    
    <!-- Font Inter (Modern Premium) untuk halaman password -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        /* =========================================
           TEMA 1: HALAMAN PASSWORD (MODERN)
           ========================================= */
        body { 
            background-color: #f6f8fa; font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; position: relative; overflow-x: hidden;
        }

        .blob-1 { position: absolute; top: -10%; left: -10%; width: 300px; height: 300px; background: #a8c0ff; border-radius: 50%; filter: blur(80px); opacity: 0.6; z-index: -1; animation: float 6s ease-in-out infinite; }
        .blob-2 { position: absolute; bottom: -10%; right: -10%; width: 300px; height: 300px; background: #ffafbd; border-radius: 50%; filter: blur(80px); opacity: 0.6; z-index: -1; animation: float 8s ease-in-out infinite alternate; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(30px); } 100% { transform: translateY(0px); } }

        .card { 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            width: 90%; max-width: 360px; padding: 40px 30px; 
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.05); text-align: center; 
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card.keyboard-active { transform: translateY(-10vh); }

        .icon-lock { width: 48px; height: 48px; fill: #111827; margin-bottom: 16px; }
        h2 { color: #111827; font-size: 22px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        p.subtitle { color: #6b7280; font-size: 14px; margin-bottom: 24px; }

        .premium-input { 
            width: 100%; padding: 16px 20px; background: #ffffff; margin-bottom: 20px;
            border: 1.5px solid #e5e7eb; border-radius: 16px; 
            font-size: 16px; font-weight: 500; color: #111827; text-align: center; transition: 0.2s;
        }
        .premium-input:focus { border-color: #111827; box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.1); }

        .btn-primary { 
            background: #111827; color: #ffffff; border: none; padding: 16px; font-size: 15px; 
            font-weight: 600; border-radius: 16px; width: 100%; cursor: pointer; transition: 0.2s;
        }
        .btn-primary:hover { background: #374151; transform: translateY(-2px); }
        .btn-primary:disabled { background: #d1d5db; color: #9ca3af; cursor: not-allowed; transform: none; }
        
        .btn-wa {
            display: flex; justify-content: center; align-items: center; gap: 8px; 
            width: 100%; margin-top: 12px; padding: 14px; font-size: 14px; font-weight: 600;
            color: #111827; text-decoration: none; background: #ffffff;
            border: 1.5px solid #e5e7eb; border-radius: 16px; transition: 0.2s;
        }
        .btn-wa:hover { background: #f9fafb; border-color: #d1d5db; transform: translateY(-2px); }
        .btn-wa svg { width: 20px; height: 20px; fill: #25D366; }
        
        .error { color: #ef4444; margin-top: 16px; font-size: 13px; font-weight: 500; display: none; }

        /* =========================================
           TEMA 2: HALAMAN KONTEN (POLOSAN BANYAK LINK)
           ========================================= */
        body.view-mode-active {
            display: block; /* Mematikan flex center */
            background-color: #ffffff; /* Polos putih */
        }
        
        #view-mode { 
            display: none; 
            max-width: 600px; margin: 0 auto; padding: 40px 20px; 
            text-align: left; white-space: pre-wrap; font-size: 15px; 
            line-height: 1.6; color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; /* Font style iPhone asli */
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
        }

        .link-blue { color: #0000ee; text-decoration: none; word-break: break-all; cursor: pointer; font-weight: 500; }
        .link-blue:hover { color: #ff0000; }
    </style>
</head>
<body oncontextmenu="return false">

<!-- HALAMAN PASSWORD -->
<div class="blob-1" id="blob1"></div>
<div class="blob-2" id="blob2"></div>

<div class="card" id="page-password">
    <svg class="icon-lock" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
    <h2>Akses Konten</h2>
    <p class="subtitle">Masukkan password untuk melihat link</p>
    
    <input type="text" id="passwordInput" class="premium-input" autocomplete="off" placeholder="Password Anda">
    <button id="btnUser" class="btn-primary">Buka Kunci</button>

    <a href="https://whatsapp.com/channel/0029Vb7ppPyCBtxEWJ5f1I0V" target="_blank" class="btn-wa">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        Saluran WhatsApp
    </a>
    <div id="errorMsg" class="error">Password tidak valid.</div>
</div>

<!-- HALAMAN KONTEN (Tampil setelah password benar) -->
<div id="view-mode"></div>

<script>
    const passwordInput = document.getElementById("passwordInput");
    const btnUser = document.getElementById("btnUser");
    const errorMsg = document.getElementById("errorMsg");
    
    passwordInput.addEventListener('focus', () => document.getElementById("page-password").classList.add('keyboard-active'));
    passwordInput.addEventListener('blur', () => document.getElementById("page-password").classList.remove('keyboard-active'));

    async function verifikasiPassword() {
        const password = passwordInput.value.trim();
        if (!password) return;
        
        errorMsg.style.display = "none";
        btnUser.innerText = "Memeriksa...";
        btnUser.disabled = true;
        
        try {
            const res = await fetch(`/api/get/${password}?t=${new Date().getTime()}`, { headers: { 'Cache-Control': 'no-cache' } });
            
            if (res.ok) {
                const data = await res.json();
                btnUser.innerText = "Berhasil!";
                
                setTimeout(() => {
                    // Sembunyikan halaman password
                    document.getElementById("page-password").style.display = "none";
                    document.getElementById("blob1").style.display = "none";
                    document.getElementById("blob2").style.display = "none";
                    
                    // Ubah jadi desain putih polosan
                    document.body.className = "view-mode-active";
                    
                    // Format teks & link
                    const viewDiv = document.getElementById("view-mode");
                    viewDiv.style.display = "block";
                    viewDiv.innerHTML = data.content.replace(/(https?:\/\/[^\s]+)/g, url => {
                        return `<a href="${url}" class="link-blue" target="_blank" rel="noopener noreferrer">${url}</a>`;
                    });
                }, 400); // Jeda sedikit biar mulus
                
            } else {
                gagalVerifikasi("Password salah. Silakan coba lagi.");
            }
        } catch (err) {
            gagalVerifikasi("Terjadi kesalahan jaringan.");
        }
    }

    function gagalVerifikasi(pesan) {
        errorMsg.innerText = pesan;
        errorMsg.style.display = "block";
        btnUser.innerText = "Buka Kunci";
        btnUser.disabled = false;
        passwordInput.value = "";
        passwordInput.focus();
    }

    btnUser.onclick = verifikasiPassword;
    passwordInput.addEventListener("keypress", (e) => { if (e.key === "Enter") verifikasiPassword(); });
</script>
</body>
</html>
