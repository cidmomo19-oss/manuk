<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Gateway Secure</title>
    
    <!-- Font Poppins untuk desain modern -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Poppins', sans-serif; outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        body { 
            background: #f4f7f6; /* Warna background modern bersih */
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden;
        }

        /* Container Card */
        .card-container { 
            background: #ffffff; width: 90%; max-width: 380px; 
            padding: 40px 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); 
            text-align: center;
            transition: transform 0.3s ease-out;
        }
        
        .card-container.keyboard-active { transform: translateY(-15vh); }

        h2 { color: #2c3e50; font-size: 24px; font-weight: 600; margin-bottom: 25px; }

        /* Input Form */
        .input-group { margin-bottom: 20px; }
        .modern-input { 
            width: 100%; padding: 16px 20px; border: 2px solid #e1e5ee; 
            border-radius: 14px; font-size: 16px; color: #333; 
            text-align: center; letter-spacing: 2px; transition: all 0.3s ease;
            background: #fafafa;
        }
        .modern-input:focus { 
            border-color: #3498db; background: #fff;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15); 
        }

        /* Button Utama */
        .btn-modern { 
            background: #3498db; color: #fff; border: none; 
            padding: 16px; font-size: 16px; font-weight: 600; 
            border-radius: 14px; width: 100%; cursor: pointer; transition: 0.3s;
            box-shadow: 0 6px 15px rgba(52, 152, 219, 0.2);
        }
        .btn-modern:hover { background: #2980b9; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(52, 152, 219, 0.3); }
        .btn-modern:active { transform: translateY(0); }
        .btn-modern:disabled { background: #a9cce3; cursor: not-allowed; box-shadow: none; transform: none; }
        
        /* Button WhatsApp */
        .btn-wa-channel {
            display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%;
            margin-top: 15px; padding: 16px; font-size: 15px; font-weight: 600;
            color: #ffffff; text-decoration: none; background: #25D366;
            border-radius: 14px; transition: 0.3s; box-shadow: 0 6px 15px rgba(37, 211, 102, 0.2);
        }
        .btn-wa-channel:hover { background: #20bd5a; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3); }
        .btn-wa-channel:active { transform: translateY(0); }
        .btn-wa-channel svg { width: 22px; height: 22px; fill: #ffffff; }
        
        .error { color: #e74c3c; margin-top: 15px; font-size: 14px; font-weight: 500; display: none; }
    </style>
</head>
<body>

<div class="card-container" id="page-password">
    <h2>Masukkan Password</h2>
    
    <div class="input-group">
        <input type="text" id="passwordInput" class="modern-input" autocomplete="off" placeholder="Ketik disini...">
    </div>
    
    <button id="btnUser" class="btn-modern">Lanjut ke Link</button>

    <a href="https://whatsapp.com/channel/0029Vb7ppPyCBtxEWJ5f1I0V" target="_blank" class="btn-wa-channel">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        Join Saluran WhatsApp
    </a>
    
    <div id="errorMsg" class="error">Password tidak valid.</div>
</div>

<script>
    const passwordInput = document.getElementById("passwordInput");
    const btnUser = document.getElementById("btnUser");
    const errorMsg = document.getElementById("errorMsg");
    const pagePassword = document.getElementById("page-password");

    // Efek naik keatas saat keyboard di HP muncul
    passwordInput.addEventListener('focus', () => pagePassword.classList.add('keyboard-active'));
    passwordInput.addEventListener('blur', () => pagePassword.classList.remove('keyboard-active'));

    async function verifikasiPassword() {
        const password = passwordInput.value.trim();
        if (!password) return;
        
        errorMsg.style.display = "none";
        
        if (["ABC", "ABCD", "BALON"].includes(password.toUpperCase())) {
            gagalVerifikasi("⚠️ Password itu hanyalah contoh, password asli ada di dalam video.");
            return;
        }
        
        btnUser.innerText = "Memeriksa...";
        btnUser.disabled = true;
        
        try {
            const res = await fetch(`/api/get/${password}?t=${new Date().getTime()}`, { headers: { 'Cache-Control': 'no-cache' } });
            
            if (res.ok) {
                const data = await res.json();
                // LANGSUNG REDIRECT KE LINK ASLI (Iklan Dihapus)
                window.location.replace(data.url);
            } else {
                gagalVerifikasi("Password tidak valid.");
            }
        } catch (err) {
            gagalVerifikasi("Error jaringan. Coba lagi.");
        }
    }

    function gagalVerifikasi(pesan) {
        errorMsg.innerText = pesan;
        errorMsg.style.display = "block";
        btnUser.innerText = "Lanjut ke Link";
        btnUser.disabled = false;
        passwordInput.value = "";
        passwordInput.focus();
    }

    btnUser.onclick = verifikasiPassword;
    passwordInput.addEventListener("keypress", (e) => { if (e.key === "Enter") verifikasiPassword(); });
</script>
</body>
</html>
