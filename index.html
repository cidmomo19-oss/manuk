<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masukkan Password</title>
    
    <meta name="robots" content="noindex, nofollow">
    
    <style>
        * { -webkit-tap-highlight-color: transparent !important; outline: none !important; }
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; background-color: #ffffff; font-family: "Courier New", Courier, monospace; color: #000000; -webkit-user-select: none; user-select: none; }
        input { -webkit-user-select: auto; user-select: auto; }

        #page-auth { width: 100%; max-width: 350px; padding: 20px; box-sizing: border-box; text-align: center; transition: transform 0.3s ease-out; }
        #page-auth.keyboard-active { transform: translateY(-25vh); }

        h2.minimal-title { margin-bottom: 5px; font-size: 22px; text-transform: lowercase; cursor: default; }
        .input-line { width: 100%; border: none; border-bottom: 2px solid #000; background: transparent; font-size: 20px; padding: 10px 0; margin: 15px 0; text-align: center; font-family: inherit; letter-spacing: 3px; }
        button.btn-minimal { background: #000; color: #fff; border: 2px solid #000; padding: 14px 20px; font-size: 16px; cursor: pointer; font-family: inherit; width: 100%; text-transform: uppercase; font-weight: bold; transition: 0.2s; }
        button.btn-minimal:disabled { background: #fff; color: #aaa; border-color: #aaa; cursor: not-allowed; }
        
        .btn-wa-channel { display: flex; justify-content: center; align-items: center; gap: 12px; width: 100%; margin-top: 15px; padding: 14px 20px; font-family: system-ui, sans-serif; font-size: 16px; font-weight: 600; color: #ffffff; text-decoration: none; background: linear-gradient(45deg, #25D366, #128C7E); border: none; border-radius: 50px; cursor: pointer; box-sizing: border-box; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); transition: transform 0.2s ease-out; }
        .btn-wa-channel:hover { transform: translateY(-3px); }
        .btn-wa-channel svg { width: 22px; height: 22px; fill: #ffffff; }
        
        .error { color: #d32f2f; margin-top: 15px; display: none; font-size: 14px; font-family: system-ui, sans-serif; line-height: 1.4; font-weight: 600; }
    </style>
</head>
<body>

<div id="page-auth">
    <h2 class="minimal-title">masukkan password</h2>
    <input type="text" id="passwordInput" class="input-line" autocomplete="off">
    <button id="btnUser" class="btn-minimal">Lanjut</button>

    <a href="https://whatsapp.com/channel/0029Vb7ppPyCBtxEWJ5f1I0V" target="_blank" class="btn-wa-channel">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        Join Saluran WhatsApp
    </a>
    <div id="errorMsg" class="error">password tidak valid.</div>
</div>

<script>
    const passwordInput = document.getElementById("passwordInput");
    const btnUser = document.getElementById("btnUser");
    const errorMsg = document.getElementById("errorMsg");
    const pageAuth = document.getElementById("page-auth");

    sessionStorage.removeItem('secureKey');
    sessionStorage.removeItem('taskDone');
    localStorage.removeItem('isProcessingTask');

    async function verifikasiPassword() {
        const password = passwordInput.value.trim();
        if (!password) return;
        errorMsg.style.display = "none";
        
        if (["ABC", "ABCD", "BALON"].includes(password.toUpperCase())) {
            gagalVerifikasi("⚠️ Password itu hanyalah contoh, password asli ada di dalam video.");
            return;
        }
        
        btnUser.innerText = "memeriksa...";
        btnUser.disabled = true;
        
        try {
            const res = await fetch(`/api/get/${password}?t=${new Date().getTime()}`, { headers: { 'Cache-Control': 'no-cache' } });
            if (res.ok) {
                // Nama kunci disamarkan jadi secureKey
                sessionStorage.setItem('secureKey', password);
                window.location.href = "verify.html"; // <-- Pindah ke file verify.html
            } else {
                gagalVerifikasi("password tidak valid.");
            }
        } catch (err) {
            gagalVerifikasi("error jaringan.");
        }
    }

    function gagalVerifikasi(pesan) {
        errorMsg.innerText = pesan;
        errorMsg.style.display = "block";
        btnUser.innerText = "Lanjut";
        btnUser.disabled = false;
        passwordInput.value = "";
        passwordInput.focus();
    }

    btnUser.onclick = verifikasiPassword;
    passwordInput.addEventListener("keypress", (e) => { if (e.key === "Enter") verifikasiPassword(); });
    passwordInput.addEventListener('focus', () => pageAuth.classList.add('keyboard-active'));
    passwordInput.addEventListener('blur', () => pageAuth.classList.remove('keyboard-active'));
</script>
</body>
</html>
