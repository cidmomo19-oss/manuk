<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- LAPIS KEAMANAN ANTI-REFERRER -->
    <meta name="referrer" content="no-referrer">
    <title>Gateway Secure</title>
    <style>
        /* ==========================================
           1. DESAIN GLOBAL & MINIMALIS
           ========================================== */
        html {
            background-color: #ffffff; 
            transition: background-color 0.5s ease;
            height: 100%; width: 100%;
        }
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            font-family: "Courier New", Courier, monospace; color: #000000; 
            display: flex; justify-content: center; align-items: center; background-color: transparent; 
        }
        
        /* Panel Tengah & Animasi Naik Keyboard */
        .panel { 
            text-align: center; width: 100%; max-width: 350px; padding: 20px; box-sizing: border-box;
            transition: transform 0.3s ease-out, opacity 0.3s ease;
        }
        .panel.keyboard-active { transform: translateY(-25vh); }
        
        h2.minimal-title { margin-bottom: 5px; font-size: 22px; text-transform: lowercase; }
        
        .input-line { 
            width: 100%; border: none; border-bottom: 2px solid #000; background: transparent; 
            font-size: 20px; padding: 10px 0; margin: 15px 0; outline: none; text-align: center; font-family: inherit;
        }
        #passwordInput { letter-spacing: 3px; }
        .input-line::placeholder { color: #ccc; font-size: 16px; letter-spacing: normal; }
        
        button.btn-minimal { 
            background: #000; color: #fff; border: 2px solid #000; padding: 14px 20px; font-size: 16px; 
            cursor: pointer; font-family: inherit; width: 100%; text-transform: uppercase; font-weight: bold; transition: 0.2s;
        }
        button.btn-minimal:hover { background: #333; }
        button.btn-minimal:disabled { background: #fff; color: #aaa; border-color: #aaa; cursor: not-allowed; }

        .error { color: #d32f2f; margin-top: 15px; display: none; font-size: 14px; }

        /* ==========================================
           2. 2 TOMBOL FLOATING WA (KIRI & KANAN BAWAH)
           ========================================== */
        .floating-group {
            position: fixed;
            bottom: 25px;
            left: 0; right: 0;
            display: flex;
            justify-content: space-between; /* Satu di Kiri, Satu di Kanan */
            padding: 0 25px;
            pointer-events: none; /* Biar area kosong ga bisa diklik */
            z-index: 9999;
            transition: transform 0.3s ease-out; /* Animasi naik ikut keyboard */
        }
        
        /* Class ini ditambahkan oleh JS saat input difokuskan */
        .floating-group.keyboard-active {
            transform: translateY(-25vh); /* Ikut naik sama persis kayak panel utama */
        }

        .floating-btn {
            background-color: #25D366; color: #fff; border-radius: 50px; padding: 12px 20px; 
            display: flex; align-items: center; gap: 10px; text-decoration: none; 
            font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 15px; 
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto; /* Aktifkan klik di tombolnya */
            white-space: nowrap; /* Teks tidak turun ke baris baru */
        }
        
        .floating-btn:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 8px 25px rgba(37, 211, 102, 0.6); }
        .floating-btn svg { width: 24px; height: 24px; fill: #ffffff; flex-shrink: 0; }
        
        /* Responsif untuk HP layarnya kecil biar text panjang muat */
        @media (max-width: 600px) {
            .floating-group { padding: 0 15px; bottom: 20px; }
            .floating-btn { padding: 10px 14px; font-size: 12px; gap: 6px; }
            .floating-btn svg { width: 20px; height: 20px; }
        }
        /* Ekstra responsif untuk HP sangat kecil (seperti iPhone SE) */
        @media (max-width: 360px) {
            .floating-btn span { display: none; } /* Sembunyikan teks, sisa Icon WA saja */
            .floating-btn { padding: 12px; border-radius: 50%; } /* Bentuk bulat sempurna */
        }
    </style>
</head>
<body>

    <!-- HALAMAN USER (MINIMALIS) -->
    <div id="userPanel" class="panel">
        <h2 class="minimal-title">masukkan password</h2>
        <input type="text" id="passwordInput" class="input-line" autocomplete="off" autofocus>
        <button onclick="cekLink()" id="btnUser" class="btn-minimal">Lanjut</button>
        <div id="errorMsg" class="error">password tidak valid.</div>
    </div>

    <!-- 2 TOMBOL FLOATING WHATSAPP (KIRI & KANAN BAWAH) -->
    <div id="floatingButtons" class="floating-group">
        <!-- KIRI: SALURAN WHATSAPP -->
        <a href="https://whatsapp.com/channel/0029Vb7ppPyCBtxEWJ5f1I0V" target="_blank" class="floating-btn">

        <!-- KANAN: CHAT ADMIN -->
        <a href="https://wa.me/6288221456346" target="_blank" class="floating-btn">
            <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
            <span>Chat admin jika mengalami masalah</span>
        </a>
    </div>

    <script>
        // CONFIG LINK IKLAN
        const adUrl = "https://conductivebreeds.com/qv7txv4c1u?key=c7d2434d3ed66645d911fc2e3d0e1bcf";

        // Trik Keyboard Mobile Fix: Saat input difokuskan, panel dan tombol WA naik bareng
        const passInput = document.getElementById('passwordInput');
        const userPanel = document.getElementById('userPanel');
        const floatingGroup = document.getElementById('floatingButtons');

        passInput.addEventListener('focus', () => {
            userPanel.classList.add('keyboard-active');
            floatingGroup.classList.add('keyboard-active');
        });
        passInput.addEventListener('blur', () => {
            userPanel.classList.remove('keyboard-active');
            floatingGroup.classList.remove('keyboard-active');
        });

        // Anti-Referrer YouTube (Amankan Jejak Web Kamu)
        function openLinkSafely(url) {
            const a = document.createElement('a');
            a.href = url;
            a.target = '_blank';
            a.rel = 'noreferrer noopener'; 
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // FUNGSI UTAMA (Buka link + Iklan)
        async function cekLink() {
            const password = document.getElementById("passwordInput").value.trim();
            const btn = document.getElementById("btnUser");
            const errorMsg = document.getElementById("errorMsg");

            if(!password) return;
            btn.innerText = "loading..."; btn.disabled = true; errorMsg.style.display = "none";

            try {
                const res = await fetch(`/api/get/${password}`);
                if (res.ok) {
                    const data = await res.json();
                    
                    btn.innerText = "mengalihkan...";
                    
                    // 1. Langsung buka link asli (No-Referrer)
                    openLinkSafely(data.url);
                    
                    // 2. Tab Lama jadi Iklan (Delay setengah detik biar smooth)
                    setTimeout(() => { window.location.href = adUrl; }, 500);

                } else {
                    errorMsg.style.display = "block";
                    btn.innerText = "lanjut"; btn.disabled = false;
                }
            } catch (err) {
                errorMsg.innerText = "error jaringan."; errorMsg.style.display = "block";
                btn.innerText = "lanjut"; btn.disabled = false;
            }
        }

        // Fitur Submit lewat Enter Keyboard
        passInput.addEventListener("keypress", (e) => { 
            if (e.key === "Enter") cekLink(); 
        });

    </script>
</body>
</html>
