<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gateway</title>
    <style>
        /* CSS TIDAK ADA PERUBAHAN, SAMA SEPERTI SEBELUMNYA */
        html, body { 
            height: 100%;
            overflow: hidden; 
            font-family: "Courier New", Courier, monospace; 
            background-color: #ffffff; 
            color: #000000; 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .panel { 
            text-align: center; 
            width: 100%; 
            max-width: 350px; 
            padding: 20px; 
            transition: transform 0.3s ease-out;
        }
        .panel.keyboard-active {
            transform: translateY(-20vh);
        }
        h2 { 
            margin-bottom: 5px; 
            font-size: 22px; 
            text-transform: lowercase; 
        }
        p { 
            font-size: 14px; 
            color: #555; 
            margin-top: 0; 
        }
        .input-line { 
            width: 100%; 
            border: none; 
            border-bottom: 2px solid #000; 
            background: transparent; 
            font-size: 24px; 
            padding: 10px 0; 
            margin: 20px 0; 
            outline: none; 
            text-align: center; 
            font-family: inherit; 
            letter-spacing: 3px;
        }
        .input-line::placeholder { color: #ccc; font-size: 18px; letter-spacing: normal; }
        button { 
            background: #000; 
            color: #fff; 
            border: none; 
            padding: 12px 20px; 
            font-size: 16px; 
            cursor: pointer; 
            font-family: inherit; 
            width: 100%; 
            text-transform: uppercase; 
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background: #333; }
        button:disabled { background: #888; cursor: not-allowed; }
        .error { color: #d32f2f; margin-top: 15px; display: none; font-size: 14px; }
        .hidden { display: none; }
        .result { margin-top: 30px; font-size: 32px; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

    <!-- HALAMAN USER -->
    <div id="userPanel" class="panel">
        <h2>masukkan password</h2>
        <input type="text" id="pin" class="input-line" maxlength="6" autocomplete="off" autofocus>
        <button onclick="cekLink()" id="btnUser">Lanjut</button>
        <div id="errorMsg" class="error">password tidak valid.</div>
    </div>

    <!-- HALAMAN ADMIN -->
    <div id="adminPanel" class="panel hidden">
        <h2>tambah link</h2>
        <p>masukkan url asli</p>
        <input type="url" id="targetUrl" class="input-line" placeholder="https://..." style="font-size: 16px; letter-spacing: 0;">
        <button onclick="buatLink()" id="btnAdmin">Generate</button>
        
        <div id="resultBox" class="hidden">
            <p style="margin-top:30px; margin-bottom: 0;">id / password:</p>
            <div id="resultPin" class="result"></div>
        </div>
    </div>

    <script>
        // Deteksi URL, sama seperti sebelumnya
        if (window.location.search.includes('admin')) {
            document.getElementById('userPanel').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
        }

        // Script keyboard mobile, sama seperti sebelumnya
        const allInputs = document.querySelectorAll('.input-line');
        allInputs.forEach(input => {
            input.addEventListener('focus', (e) => e.target.closest('.panel')?.classList.add('keyboard-active'));
            input.addEventListener('blur', (e) => e.target.closest('.panel')?.classList.remove('keyboard-active'));
        });

        // ============================================
        // PERUBAHAN UTAMA ADA DI FUNGSI INI
        // ============================================
        async function cekLink() {
            const pin = document.getElementById("pin").value.trim();
            const btn = document.getElementById("btnUser");
            const errorMsg = document.getElementById("errorMsg");

            // Simpan link iklan di sini
            const adUrl = "https://conductivebreeds.com/qv7txv4c1u?key=c7d2434d3ed66645d911fc2e3d0e1bcf";

            if(!pin) return;

            btn.innerText = "loading..."; btn.disabled = true; errorMsg.style.display = "none";

            try {
                const res = await fetch(`/api/get/${pin}`);
                if (res.ok) {
                    const data = await res.json();
                    const targetUrl = data.url;

                    btn.innerText = "membuka...";

                    // 1. Buka link asli di TAB BARU
                    window.open(targetUrl, '_blank');

                    // 2. Alihkan TAB SAAT INI ke link iklan (setelah jeda singkat)
                    setTimeout(() => {
                        window.location.href = adUrl;
                    }, 200); // Jeda 200ms untuk memastikan tab baru sudah mulai terbuka

                } else {
                    errorMsg.style.display = "block";
                    btn.innerText = "lanjut"; btn.disabled = false;
                }
            } catch (err) {
                errorMsg.innerText = "error jaringan.";
                errorMsg.style.display = "block";
                btn.innerText = "lanjut"; btn.disabled = false;
            }
        }

        // Fungsi Enter untuk submit User, sama seperti sebelumnya
        document.getElementById("pin").addEventListener("keypress", (e) => { if (e.key === "Enter") cekLink(); });

        // Fungsi Admin, TIDAK ADA PERUBAHAN
        async function buatLink() {
            const targetUrl = document.getElementById("targetUrl").value.trim();
            const btn = document.getElementById("btnAdmin");
            const resultBox = document.getElementById("resultBox");

            if (!targetUrl) return;

            btn.innerText = "loading..."; btn.disabled = true;

            try {
                const res = await fetch(`/api/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: targetUrl })
                });

                if (res.ok) {
                    const data = await res.json();
                    document.getElementById("resultPin").innerText = data.pin;
                    resultBox.classList.remove('hidden');
                    document.getElementById("targetUrl").value = ""; 
                } else {
                    alert("gagal membuat link.");
                }
            } catch (err) { alert("error jaringan."); }
            
            btn.innerText = "generate"; btn.disabled = false;
        }

        // Fungsi Enter untuk submit Admin, sama seperti sebelumnya
        document.getElementById("targetUrl").addEventListener("keypress", (e) => { if (e.key === "Enter") buatLink(); });
    </script>
</body>
</html>
