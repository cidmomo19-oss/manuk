<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- PENTING: Meta tag untuk anti-zoom dan layout mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gateway</title>
    <style>
        /* Desain Minimalis ala Catbox */
        html, body { 
            height: 100%;
            overflow: hidden; /* Mencegah scroll di seluruh halaman */
            font-family: "Courier New", Courier, monospace; 
            background-color: #ffffff; 
            color: #000000; 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .panel { 
            text-align: center; 
            width: 100%; 
            max-width: 350px; 
            padding: 20px; 
            /* Animasi halus saat panel bergerak naik/turun */
            transition: transform 0.3s ease-out;
        }
        
        /* Class ini akan ditambahkan oleh JavaScript saat keyboard aktif */
        .panel.keyboard-active {
            transform: translateY(-20vh); /* Geser ke atas sebesar 20% tinggi layar */
        }

        h2 { 
            margin-bottom: 5px; 
            font-size: 22px; 
            text-transform: lowercase; 
        }
        p { 
            font-size: 14px; 
            color: #555; 
            margin-top: 0; 
        }
        
        /* Input Cuma Garis Bawah */
        .input-line { 
            width: 100%; 
            border: none; 
            border-bottom: 2px solid #000; 
            background: transparent; 
            font-size: 24px; 
            padding: 10px 0; 
            margin: 20px 0; 
            outline: none; 
            text-align: center; 
            font-family: inherit; 
            letter-spacing: 3px;
        }
        .input-line::placeholder { color: #ccc; font-size: 18px; letter-spacing: normal; }

        /* Tombol Polos Hitam */
        button { 
            background: #000; 
            color: #fff; 
            border: none; 
            padding: 12px 20px; 
            font-size: 16px; 
            cursor: pointer; 
            font-family: inherit; 
            width: 100%; 
            text-transform: uppercase; 
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background: #333; }
        button:disabled { background: #888; cursor: not-allowed; }

        .error { color: #d32f2f; margin-top: 15px; display: none; font-size: 14px; }
        .hidden { display: none; }
        .result { margin-top: 30px; font-size: 32px; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

    <!-- HALAMAN USER -->
    <div id="userPanel" class="panel">
        <h2>masukkan password</h2>
        <input type="text" id="pin" class="input-line" maxlength="6" autocomplete="off" autofocus>
        <button onclick="cekLink()" id="btnUser">Lanjut</button>
        <div id="errorMsg" class="error">password tidak valid.</div>
    </div>

    <!-- HALAMAN ADMIN -->
    <div id="adminPanel" class="panel hidden">
        <h2>tambah link</h2>
        <p>masukkan url asli</p>
        <input type="url" id="targetUrl" class="input-line" placeholder="https://..." style="font-size: 16px; letter-spacing: 0;">
        <button onclick="buatLink()" id="btnAdmin">Generate</button>
        
        <div id="resultBox" class="hidden">
            <p style="margin-top:30px; margin-bottom: 0;">id / password:</p>
            <div id="resultPin" class="result"></div>
        </div>
    </div>

    <script>
        // Deteksi URL: kalau ada ?admin, munculkan halaman tambah link
        if (window.location.search.includes('admin')) {
            document.getElementById('userPanel').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
        }

        // ============================================
        // SCRIPT UNTUK ATASI KEYBOARD MOBILE (iPhone & Android)
        // ============================================
        const allInputs = document.querySelectorAll('.input-line');

        allInputs.forEach(input => {
            // Saat user tap input (keyboard akan muncul)
            input.addEventListener('focus', (e) => {
                const parentPanel = e.target.closest('.panel');
                if (parentPanel) {
                    parentPanel.classList.add('keyboard-active');
                }
            });

            // Saat user selesai ngetik/tap di luar input (keyboard akan hilang)
            input.addEventListener('blur', (e) => {
                const parentPanel = e.target.closest('.panel');
                if (parentPanel) {
                    parentPanel.classList.remove('keyboard-active');
                }
            });
        });


        // Fungsi User (Cek PIN)
        async function cekLink() {
            const pin = document.getElementById("pin").value.trim();
            const btn = document.getElementById("btnUser");
            const errorMsg = document.getElementById("errorMsg");

            if(!pin) return;

            btn.innerText = "loading..."; btn.disabled = true; errorMsg.style.display = "none";

            try {
                const res = await fetch(`/api/get/${pin}`);
                if (res.ok) {
                    const data = await res.json();
                    btn.innerText = "redirecting...";
                    window.location.href = data.url; 
                } else {
                    errorMsg.style.display = "block";
                    btn.innerText = "lanjut"; btn.disabled = false;
                }
            } catch (err) {
                errorMsg.innerText = "error jaringan.";
                errorMsg.style.display = "block";
                btn.innerText = "lanjut"; btn.disabled = false;
            }
        }

        // Enter untuk submit User
        document.getElementById("pin").addEventListener("keypress", function(e) {
            if (e.key === "Enter") cekLink();
        });

        // Fungsi Admin (Buat Link)
        async function buatLink() {
            const targetUrl = document.getElementById("targetUrl").value.trim();
            const btn = document.getElementById("btnAdmin");
            const resultBox = document.getElementById("resultBox");

            if (!targetUrl) return;

            btn.innerText = "loading..."; btn.disabled = true;

            try {
                const res = await fetch(`/api/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: targetUrl })
                });

                if (res.ok) {
                    const data = await res.json();
                    document.getElementById("resultPin").innerText = data.pin;
                    resultBox.classList.remove('hidden');
                    document.getElementById("targetUrl").value = ""; 
                } else {
                    alert("gagal membuat link.");
                }
            } catch (err) { alert("error jaringan."); }
            
            btn.innerText = "generate"; btn.disabled = false;
        }

        // Enter untuk submit Admin
        document.getElementById("targetUrl").addEventListener("keypress", function(e) {
            if (e.key === "Enter") buatLink();
        });
    </script>
</body>
</html>
