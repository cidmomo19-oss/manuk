<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akses Link Rahasia</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        input#pin { text-align: center; font-size: 24px; letter-spacing: 5px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .btn-admin { background: #28a745; }
        .btn-admin:hover { background: #218838; }
        .error { color: red; font-size: 14px; margin-top: 10px; display: none; }
        .hidden { display: none; }
        .result-pin { font-size: 35px; color: #d32f2f; font-weight: bold; margin: 15px 0; letter-spacing: 5px; }
    </style>
</head>
<body>

    <!-- UI USER -->
    <div id="userPanel" class="box">
        <h2>Masukkan PIN</h2>
        <p style="font-size: 14px; color: #666;">Masukkan 6 digit angka untuk lanjut</p>
        <input type="text" id="pin" maxlength="6" placeholder="------" autocomplete="off">
        <button onclick="cekLink()" id="btnUser">Buka Link</button>
        <div id="errorMsg" class="error">PIN Salah / Tidak Ditemukan!</div>
    </div>

    <!-- UI ADMIN (Tersembunyi by default) -->
    <div id="adminPanel" class="box hidden" style="background: #222; color: white;">
        <h2>Admin Panel</h2>
        <input type="password" id="adminSecret" placeholder="Password Admin">
        <input type="url" id="targetUrl" placeholder="https://link-asli.com/file..." required>
        <button onclick="buatLink()" id="btnAdmin" class="btn-admin">Generate PIN</button>
        
        <div id="resultBox" class="hidden">
            <p style="margin-top:20px; color:#aaa;">PIN Berhasil Dibuat:</p>
            <div id="resultPin" class="result-pin">123456</div>
        </div>
    </div>

    <script>
        // Cek URL, kalau ada ?admin tampilkan panel admin
        if (window.location.search.includes('admin')) {
            document.getElementById('userPanel').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            document.body.style.background = "#111"; // Gelapin background biar beda
        }

        // LOGIC USER
        async function cekLink() {
            const pin = document.getElementById("pin").value;
            const btn = document.getElementById("btnUser");
            const errorMsg = document.getElementById("errorMsg");

            if(pin.length !== 6) { alert("Wajib 6 digit angka!"); return; }

            btn.innerText = "Mengecek..."; btn.disabled = true; errorMsg.style.display = "none";

            try {
                const res = await fetch(`/api/get/${pin}`);
                if (res.ok) {
                    const data = await res.json();
                    btn.innerText = "Mengalihkan...";
                    window.location.href = data.url; // Pindah ke link asli
                } else {
                    errorMsg.style.display = "block";
                    btn.innerText = "Buka Link"; btn.disabled = false;
                }
            } catch (err) {
                alert("Gangguan jaringan"); btn.innerText = "Buka Link"; btn.disabled = false;
            }
        }

        // LOGIC ADMIN
        async function buatLink() {
            const adminSecret = document.getElementById("adminSecret").value;
            const targetUrl = document.getElementById("targetUrl").value;
            const btn = document.getElementById("btnAdmin");
            const resultBox = document.getElementById("resultBox");

            if (!targetUrl || !adminSecret) { alert("Isi form dengan lengkap!"); return; }

            btn.innerText = "Memproses..."; btn.disabled = true;

            try {
                const res = await fetch(`/api/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminSecret, url: targetUrl })
                });

                if (res.ok) {
                    const data = await res.json();
                    document.getElementById("resultPin").innerText = data.pin;
                    resultBox.classList.remove('hidden');
                    document.getElementById("targetUrl").value = ""; // bersihkan input URL
                } else {
                    alert("Gagal: Password admin salah / Error");
                }
            } catch (err) { alert("Gangguan jaringan"); }
            
            btn.innerText = "Generate PIN"; btn.disabled = false;
        }
    </script>
</body>
</html>
