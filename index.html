<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Gateway Secure</title>
    <style>
        html { background-color: #ffffff; transition: background-color 0.5s ease; height: 100%; width: 100%; }
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            font-family: "Courier New", Courier, monospace; color: #000000; 
            display: flex; justify-content: center; align-items: center; 
        }
        .panel { text-align: center; width: 100%; max-width: 350px; padding: 20px; box-sizing: border-box; transition: transform 0.3s ease-out; }
        .panel.keyboard-active { transform: translateY(-25vh); }
        h2.minimal-title { margin-bottom: 5px; font-size: 22px; text-transform: lowercase; }

        .input-line { 
            width: 100%; border: none; border-bottom: 2px solid #000; background: transparent; 
            font-size: 20px; padding: 10px 0; margin: 15px 0; outline: none; text-align: center; font-family: inherit;
        }
        #passwordInput { letter-spacing: 3px; }
        
        #helperText { display: none; font-size: 15px; margin: 15px 0; color: #555; font-family: system-ui, sans-serif; }

        button.btn-minimal { 
            background: #000; color: #fff; border: 2px solid #000; padding: 14px 20px; font-size: 16px; 
            cursor: pointer; font-family: inherit; width: 100%; text-transform: uppercase; font-weight: bold; transition: 0.2s;
        }
        button.btn-minimal:disabled { background: #fff; color: #aaa; border-color: #aaa; cursor: not-allowed; }
        
        .btn-wa-channel {
            display: flex; justify-content: center; align-items: center; gap: 12px; width: 100%;
            margin-top: 15px; padding: 14px 20px; font-family: system-ui, sans-serif; font-size: 16px; font-weight: 600;
            color: #ffffff; text-decoration: none; background: linear-gradient(45deg, #25D366, #128C7E);
            border: none; border-radius: 50px; cursor: pointer; box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
        }
        .btn-wa-channel:hover { transform: translateY(-3px); box-shadow: 0 7px 20px rgba(0, 0, 0, 0.15); }
        .btn-wa-channel svg { width: 22px; height: 22px; fill: #ffffff; }

        .error { 
            color: #d32f2f; 
            margin-top: 15px; 
            display: none; /* Awalnya disembunyikan */
            font-size: 14px;
            font-family: system-ui, sans-serif; /* Font lebih mudah dibaca untuk notif */
            font-weight: 500;
        }
        
        .floating-wa {
            position: fixed; bottom: 25px; right: 25px; background-color: #25D366; color: #fff;
            border-radius: 50px; padding: 12px 20px; display: flex; align-items: center; gap: 10px;
            text-decoration: none; font-family: system-ui, sans-serif; font-weight: 700; font-size: 15px; z-index: 9999;
            transition: transform 0.2s ease-out;
        }
        .floating-wa svg { width: 24px; height: 24px; fill: #ffffff; }
    </style>
</head>
<body>

<div class="panel">
    <h2 class="minimal-title">Gateway Secure</h2>
    
    <!-- Form untuk input password -->
    <form id="loginForm">
        <input type="password" id="passwordInput" class="input-line" placeholder="Enter Password" required>
        
        <!-- Elemen untuk menampilkan notifikasi -->
        <p id="errorMessage" class="error"></p>
        
        <button type="submit" class="btn-minimal">Unlock</button>
    </form>
    
    <a href="#" class="btn-wa-channel" target="_blank">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.8 0-65.7-10.8-94.2-30.6l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>
        <span>Join WhatsApp Channel</span>
    </a>
</div>

<a href="#" class="floating-wa" target="_blank">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.8 0-65.7-10.8-94.2-30.6l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>
    <span>Hubungi Admin</span>
</a>

<script>
    // Menunggu seluruh halaman dimuat sebelum menjalankan script
    document.addEventListener('DOMContentLoaded', function() {
        
        // Mengambil elemen-elemen yang dibutuhkan dari HTML
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('passwordInput');
        const errorMessage = document.getElementById('errorMessage');
        const panel = document.querySelector('.panel');

        // Daftar password contoh (dalam huruf besar untuk perbandingan yang konsisten)
        const examplePasswords = ['ABC', 'ABCD', 'BALON'];

        // Menambahkan event listener ke form saat disubmit (tombol 'Unlock' diklik)
        loginForm.addEventListener('submit', function(event) {
            // Mencegah form mengirim data dan me-reload halaman
            event.preventDefault(); 
            
            // Mengambil nilai dari input, menghapus spasi di awal/akhir, dan mengubahnya menjadi huruf besar
            const enteredPassword = passwordInput.value.trim().toUpperCase();

            // Memeriksa apakah password yang dimasukkan ada di dalam daftar password contoh
            if (examplePasswords.includes(enteredPassword)) {
                // Jika ya, tampilkan notifikasi yang diminta
                errorMessage.textContent = 'Itu hanyalah contoh, password aslinya ada di dalam video.';
                errorMessage.style.display = 'block'; // Menampilkan elemen notifikasi
            } else if (enteredPassword === '') {
                // Jika input kosong
                errorMessage.textContent = 'Password tidak boleh kosong.';
                errorMessage.style.display = 'block';
            } else {
                // Jika password salah (bukan contoh dan bukan yang benar)
                // Anda bisa menambahkan logika untuk password yang benar di sini
                // Untuk sekarang, kita tampilkan pesan error umum
                errorMessage.textContent = 'Password salah, silakan coba lagi.';
                errorMessage.style.display = 'block';
            }
        });
        
        // --- Fitur Tambahan untuk User Experience di Mobile ---
        // Menaikkan panel saat keyboard muncul agar tidak menutupi input
        passwordInput.addEventListener('focus', function() {
            panel.classList.add('keyboard-active');
        });
        
        passwordInput.addEventListener('blur', function() {
            panel.classList.remove('keyboard-active');
        });
    });
</script>

</body>
</html>
