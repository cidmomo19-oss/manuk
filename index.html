<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Gateway Secure</title>
    <style>
        html { background-color: #ffffff; transition: background-color 0.5s ease; height: 100%; width: 100%; }
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            font-family: "Courier New", Courier, monospace; color: #000000; 
            display: flex; justify-content: center; align-items: center; 
        }
        .panel { text-align: center; width: 100%; max-width: 350px; padding: 20px; box-sizing: border-box; transition: transform 0.3s ease-out; }
        .panel.keyboard-active { transform: translateY(-25vh); }
        h2.minimal-title { margin-bottom: 5px; font-size: 22px; text-transform: lowercase; }
        .input-line { 
            width: 100%; border: none; border-bottom: 2px solid #000; background: transparent; 
            font-size: 20px; padding: 10px 0; margin: 15px 0; outline: none; text-align: center; font-family: inherit;
        }
        #passwordInput { letter-spacing: 3px; }
        button.btn-minimal { 
            background: #000; color: #fff; border: 2px solid #000; padding: 14px 20px; font-size: 16px; 
            cursor: pointer; font-family: inherit; width: 100%; text-transform: uppercase; font-weight: bold; transition: 0.2s;
        }
        button.btn-minimal:disabled { background: #fff; color: #aaa; border-color: #aaa; cursor: not-allowed; }
        .error { color: #d32f2f; margin-top: 15px; display: none; font-size: 14px; }
        
        .floating-wa {
            position: fixed; bottom: 25px; right: 25px; background-color: #25D366; color: #fff;
            border-radius: 50px; padding: 12px 20px; display: flex; align-items: center; gap: 10px;
            text-decoration: none; font-family: system-ui, sans-serif; font-weight: 700; font-size: 15px; z-index: 9999;
            /* Tambahkan transisi untuk pergerakan yang mulus */
            transition: transform 0.2s ease-out;
        }
        
        .floating-wa svg { width: 24px; height: 24px; fill: #ffffff; }
    </style>
</head>
<body>

    <div id="userPanel" class="panel">
        <h2 class="minimal-title">masukkan password</h2>
        <input type="text" id="passwordInput" class="input-line" autocomplete="off" autofocus>
        <button onclick="cekLink()" id="btnUser" class="btn-minimal">Lanjut</button>
        <div id="errorMsg" class="error">password tidak valid.</div>
    </div>

    <a href="https://wa.me/6288221456346" target="_blank" class="floating-wa" id="btnWa">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        <span>Chat Admin Jika Mengalami Masalah</span>
    </a>

    <script>
        // DAFTAR IKLAN (Bisa ditambah kalau mau lebih dari 2)
        const daftarIklan = [
            "https://conductivebreeds.com/qv7txv4c1u?key=c7d2434d3ed66645d911fc2e3d0e1bcf", // Iklan 1
            "https://omg10.com/4/10608604" // Iklan 2 (Baru)
        ];

        const passwordInput = document.getElementById("passwordInput");
        const btnUser = document.getElementById("btnUser");
        const errorMsg = document.getElementById("errorMsg");
        const btnWa = document.getElementById("btnWa"); 

        // RESET SAAT KEMBALI (BACK)
        window.addEventListener("pageshow", (event) => {
            btnUser.disabled = false;
            btnUser.innerText = "Lanjut";
            
            const savedPassword = sessionStorage.getItem("tempPassword");
            if (savedPassword) {
                passwordInput.value = savedPassword;
            }
        });

        async function cekLink() {
            const password = passwordInput.value.trim();
            if(!password) return;

            btnUser.innerText = "mengalihkan..."; 
            btnUser.disabled = true; 
            errorMsg.style.display = "none";

            try {
                const res = await fetch(`/api/get/${password}`);
                
                if (res.ok) {
                    const data = await res.json();
                    let langkahIklan = parseInt(sessionStorage.getItem("langkahIklan") || "0");
                    if (langkahIklan < daftarIklan.length) {
                        sessionStorage.setItem("tempPassword", password);
                        sessionStorage.setItem("langkahIklan", (langkahIklan + 1).toString()); 
                        window.location.href = daftarIklan[langkahIklan];
                    } else {
                        sessionStorage.removeItem("langkahIklan");
                        sessionStorage.removeItem("tempPassword");
                        window.location.href = data.url;
                    }
                } else {
                    errorMsg.style.display = "block";
                    btnUser.innerText = "lanjut"; btnUser.disabled = false;
                }
            } catch (err) {
                errorMsg.innerText = "error jaringan."; errorMsg.style.display = "block";
                btnUser.innerText = "lanjut"; btnUser.disabled = false;
            }
        }

        passwordInput.addEventListener("keypress", (e) => { 
            if (e.key === "Enter") cekLink(); 
        });

        // Script keyboard mobile fix
        passwordInput.addEventListener('focus', (e) => e.target.closest('.panel')?.classList.add('keyboard-active'));
        passwordInput.addEventListener('blur', (e) => e.target.closest('.panel')?.classList.remove('keyboard-active'));

        // ==========================================================
        // SCRIPT BARU: Menggeser tombol WA saat keyboard muncul
        // ==========================================================
        const handleKeyboardPosition = () => {
            if (!window.visualViewport) return; // Hanya jalan di browser modern

            // Ukuran tinggi window keseluruhan
            const windowHeight = window.innerHeight;
            // Ukuran tinggi area yang terlihat (setelah dikurangi keyboard)
            const viewportHeight = window.visualViewport.height;

            // Hitung tinggi keyboard (atau area yang tertutup)
            const keyboardHeight = windowHeight - viewportHeight;

            // Jika ada area yang tertutup (keyboard muncul)
            if (keyboardHeight > 0) {
                // Geser tombol WA ke atas sejauh tinggi keyboard
                btnWa.style.transform = `translateY(-${keyboardHeight}px)`;
            } else {
                // Kembalikan ke posisi semula
                btnWa.style.transform = 'translateY(0)';
            }
        };

        // Jalankan fungsi saat viewport berubah ukuran (saat keyboard muncul/hilang)
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', handleKeyboardPosition);
            // Jalankan sekali saat load untuk antisipasi
            handleKeyboardPosition(); 
        }
        // ==========================================================
        
    </script>
</body>
</html>
