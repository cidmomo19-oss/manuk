<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Gateway Secure</title>
    
    <!-- Font Poppins untuk halaman Modern -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* === EFEK TRANSISI HALAMAN === */
        html { transition: background 0.5s ease; height: 100%; width: 100%; }
        html.theme-pw { background-color: #ffffff; }
        /* Background baru untuk halaman iklan (Soft Gradient) */
        html.theme-ads { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); }

        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
        }

        /* Tema 1: Halaman Password (Original) */
        body.theme-pw { font-family: "Courier New", Courier, monospace; color: #000000; }
        
        /* Tema 2: Halaman Iklan (Modern Premium) */
        body.theme-ads { font-family: 'Poppins', sans-serif; }

        /* Container Pages */
        #page-password { 
            display: block; width: 100%; max-width: 350px; padding: 20px; 
            box-sizing: border-box; text-align: center; 
            transition: transform 0.3s ease-out; 
        }
        #page-iklan { display: none; width: 90%; max-width: 400px; perspective: 1000px; }
        
        /* Animasi form naik saat keyboard muncul (Asli) */
        #page-password.keyboard-active { transform: translateY(-25vh); }

        /* === CSS HALAMAN PASSWORD (ASLI 100%) === */
        h2.minimal-title { margin-bottom: 5px; font-size: 22px; text-transform: lowercase; }
        .input-line { 
            width: 100%; border: none; border-bottom: 2px solid #000; background: transparent; 
            font-size: 20px; padding: 10px 0; margin: 15px 0; outline: none; text-align: center; font-family: inherit; letter-spacing: 3px;
        }
        button.btn-minimal { 
            background: #000; color: #fff; border: 2px solid #000; padding: 14px 20px; font-size: 16px; 
            cursor: pointer; font-family: inherit; width: 100%; text-transform: uppercase; font-weight: bold; transition: 0.2s;
        }
        button.btn-minimal:disabled { background: #fff; color: #aaa; border-color: #aaa; cursor: not-allowed; }
        
        .btn-wa-channel {
            display: flex; justify-content: center; align-items: center; gap: 12px; width: 100%;
            margin-top: 15px; padding: 14px 20px; font-family: system-ui, sans-serif; font-size: 16px; font-weight: 600;
            color: #ffffff; text-decoration: none; background: linear-gradient(45deg, #25D366, #128C7E);
            border: none; border-radius: 50px; cursor: pointer; box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); 
            transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
        }
        .btn-wa-channel:hover { transform: translateY(-3px); box-shadow: 0 7px 20px rgba(0, 0, 0, 0.15); }
        .btn-wa-channel svg { width: 22px; height: 22px; fill: #ffffff; }
        
        .error { color: #d32f2f; margin-top: 15px; display: none; font-size: 14px; font-family: system-ui, sans-serif; line-height: 1.4; font-weight: 600; }
        
        /* === CSS HALAMAN IKLAN (MODERN PREMIUM) === */
        .s4u-card {
            background: rgba(255, 255, 255, 0.95); padding: 40px 25px; border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); text-align: center;
            border: 1px solid rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            animation: slideUpFade 0.5s ease-out forwards;
        }
        
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }

        /* Ikon Kopi Premium */
        .s4u-header-icon {
            display: inline-flex; justify-content: center; align-items: center;
            width: 80px; height: 80px; background: linear-gradient(135deg, #FFF0E6, #FFE0CC);
            border-radius: 50%; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(255, 126, 95, 0.2);
        }
        .s4u-header-icon svg { width: 40px; height: 40px; fill: #FF7E5F; }
        
        .s4u-card h2 { margin: 0 0 10px 0; color: #2d3436; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .s4u-card p.subtitle { color: #636e72; font-size: 14px; margin-bottom: 30px; line-height: 1.6; font-weight: 500; }
        .s4u-card p.subtitle b { color: #FF7E5F; }

        .task-list { display: flex; flex-direction: column; gap: 15px; margin-bottom: 35px; }
        
        /* Tombol Iklan Gradient Warm */
        .btn-task {
            display: flex; align-items: center; justify-content: space-between;
            background: linear-gradient(135deg, #FF7E5F, #FEB47B); color: white; 
            padding: 16px 22px; border-radius: 14px; font-weight: 600; font-size: 15px; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: pointer; border: none; width: 100%; 
            font-family: inherit; box-shadow: 0 8px 20px rgba(255, 126, 95, 0.3);
        }
        .btn-task:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 12px 25px rgba(255, 126, 95, 0.5); }
        .btn-task:active { transform: translateY(0) scale(0.98); }
        .btn-task svg { width: 24px; height: 24px; fill: white; flex-shrink: 0; }
        
        /* Status Tombol Misi */
        .btn-task.done { background: linear-gradient(135deg, #00b09b, #96c93d); box-shadow: 0 8px 20px rgba(0, 176, 155, 0.3); pointer-events: none; }
        .btn-task.failed { background: #ff4757; box-shadow: 0 8px 20px rgba(255, 71, 87, 0.3); animation: shake 0.4s ease-in-out; }

        /* Tombol Dapatkan Link */
        .btn-unlock {
            background: #dfe6e9; color: #b2bec3; width: 100%; padding: 16px; border: none; border-radius: 14px;
            font-size: 16px; font-weight: 700; cursor: not-allowed; transition: all 0.4s ease; font-family: inherit;
        }
        .btn-unlock.active { 
            background: #0984e3; color: white; cursor: pointer; 
            box-shadow: 0 8px 20px rgba(9, 132, 227, 0.4); animation: pulseBtn 2s infinite; 
        }
        .btn-unlock.active:hover { background: #74b9ff; transform: translateY(-2px); }
        
        /* Animasi */
        @keyframes pulseBtn { 0% { box-shadow: 0 0 0 0 rgba(9, 132, 227, 0.4); } 70% { box-shadow: 0 0 0 12px rgba(9, 132, 227, 0); } 100% { box-shadow: 0 0 0 0 rgba(9, 132, 227, 0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body class="theme-pw">

<!-- ============================================== -->
<!-- HALAMAN 1: PASSWORD (ORIGINAL)                 -->
<!-- ============================================== -->
<div id="page-password">
    <h2 class="minimal-title">masukkan password</h2>
    
    <input type="text" id="passwordInput" class="input-line" autocomplete="off">
    
    <button id="btnUser" class="btn-minimal">Lanjut</button>

    <a href="https://whatsapp.com/channel/0029Vb7ppPyCBtxEWJ5f1I0V" target="_blank" class="btn-wa-channel">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        Join Saluran WhatsApp
    </a>
    <div id="errorMsg" class="error">password tidak valid.</div>
</div>

<!-- ============================================== -->
<!-- HALAMAN 2: IKLAN GATEWAY (PREMIUM)             -->
<!-- ============================================== -->
<div id="page-iklan" class="s4u-card">
    <div class="s4u-header-icon">
        <!-- Ikon Kopi (Bantu Jajan) -->
        <svg viewBox="0 0 24 24"><path d="M20,3H4v10c0,2.21,1.79,4,4,4h6c2.21,0,4-1.79,4-4v-3h2c1.11,0,2-0.9,2-2V5C22,3.9,21.11,3,20,3z M20,8h-2V5h2V8z M4,19h16v2H4V19z"/></svg>
    </div>
    <h2>Bantu admin beli jajan ☕</h2>
    <p class="subtitle">Klik tombol di bawah, anteng disana selama <b>5 detik</b>, lalu tekan tombol <b>KEMBALI</b> di HP-mu untuk mengambil link asli.</p>

    <div class="task-list">
        <!-- Tombol Iklan -->
        <button class="btn-task" id="btnIklan" onclick="bukaIklan()">
            <span id="textIklan">Klik disini (Wajib 5 Detik)</span>
            <!-- Ikon Arrow Kanan -->
            <svg id="iconIklan" viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
        </button>
    </div>

    <!-- Tombol Dapatkan Link -->
    <button class="btn-unlock" id="btnUnlock" onclick="bukaLinkAsli()" disabled>Dapatkan Link Asli</button>
</div>

<!-- ============================================== -->
<!-- SCRIPT GABUNGAN LOGIKA                         -->
<!-- ============================================== -->
<script>
    // === DAFTAR IKLAN (ROTATOR) ===
    const linkIklan1 = "https://conductivebreeds.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9";
    const linkIklan2 = "https://omg10.com/4/10390860";

    let targetUrlAsli = ""; 

    const passwordInput = document.getElementById("passwordInput");
    const btnUser = document.getElementById("btnUser");
    const errorMsg = document.getElementById("errorMsg");
    const pagePassword = document.getElementById("page-password");
    const pageIklan = document.getElementById("page-iklan");

    // ==========================================
    // INIT (Menggunakan Pageshow agar kebal Bfcache)
    // ==========================================
    window.addEventListener("pageshow", (event) => {
        btnUser.onclick = verifikasiPassword;
        
        const sedangTungguIklan = sessionStorage.getItem('tungguIklan');
        const urlTersimpan = sessionStorage.getItem('urlAsliDisimpan');
        
        if (sedangTungguIklan === 'true') {
            // Evaluasi waktunya jika dia baru "Back" dari klik iklan
            evaluasiKembaliDariIklan();
        } else if (urlTersimpan) {
            // Jika dia refresh halaman (sudah masukin PW tapi belum klik iklan)
            targetUrlAsli = urlTersimpan;
            tampilkanHalamanIklan();
        } else {
            // Jika baru pertama buka web
            document.documentElement.className = "theme-pw";
            passwordInput.focus();
        }
    });

    // Deteksi kalau HP cuma pindah tab
    document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
            const sedangTungguIklan = sessionStorage.getItem('tungguIklan');
            if (sedangTungguIklan === 'true') {
                evaluasiKembaliDariIklan();
            }
        }
    });

    // ==========================================
    // 1. LOGIKA CEK PASSWORD
    // ==========================================
    async function verifikasiPassword() {
        const password = passwordInput.value.trim();
        if(!password) return;

        errorMsg.style.display = "none";

        const cekPassword = password.toUpperCase();
        if (cekPassword === "ABC" || cekPassword === "ABCD" || cekPassword === "BALON") {
            errorMsg.innerText = "⚠️ Password itu hanyalah contoh, password asli ada di dalam video.";
            errorMsg.style.display = "block";
            passwordInput.value = ""; 
            passwordInput.focus(); 
            return; 
        }

        btnUser.innerText = "memeriksa..."; 
        btnUser.disabled = true; 

        try {
            const waktuSekarang = new Date().getTime();
            const res = await fetch(`/api/get/${password}?t=${waktuSekarang}`, {
                method: 'GET',
                headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate' }
            });
            
            if (res.ok) {
                const data = await res.json();
                targetUrlAsli = data.url; 
                
                // SIMPAN Link Asli ke Memory
                sessionStorage.setItem('urlAsliDisimpan', targetUrlAsli);

                tampilkanHalamanIklan();
            } else {
                errorMsg.innerText = "password tidak valid.";
                errorMsg.style.display = "block";
                btnUser.innerText = "Lanjut"; 
                btnUser.disabled = false;
            }
        } catch (err) {
            errorMsg.innerText = "error jaringan."; 
            errorMsg.style.display = "block";
            btnUser.innerText = "Lanjut"; 
            btnUser.disabled = false;
        }
    }

    function tampilkanHalamanIklan() {
        pagePassword.style.display = "none";
        document.documentElement.className = "theme-ads";
        document.body.className = "theme-ads";
        pageIklan.style.display = "block";
    }

    // ANIMASI KEYBOARD ASLI 
    passwordInput.addEventListener("keypress", (e) => { 
        if (e.key === "Enter") verifikasiPassword(); 
    });
    passwordInput.addEventListener('focus', () => pagePassword.classList.add('keyboard-active'));
    passwordInput.addEventListener('blur', () => pagePassword.classList.remove('keyboard-active'));


    // ==========================================
    // 2. LOGIKA IKLAN REDIRECT & ROTATOR GANJIL/GENAP
    // ==========================================
    function bukaIklan() {
        // Ambil urutan dari localStorage (Agar persisten walau Chrome ditutup)
        let urutan = localStorage.getItem('urutanIklanMisi') || 0;
        urutan = parseInt(urutan);

        // Penentuan Ganjil / Genap
        let linkTarget = (urutan % 2 === 0) ? linkIklan1 : linkIklan2;

        // Tambahkan urutan untuk klik selanjutnya lalu simpan lagi
        localStorage.setItem('urutanIklanMisi', urutan + 1);

        // Catat waktu pergi ke iklan (Pakai sessionStorage karena ini cuma per percobaan)
        sessionStorage.setItem('waktuKlikIklan', Date.now());
        sessionStorage.setItem('tungguIklan', 'true');

        // Pindah (Redirect) halaman ke link Iklan yang terpilih
        window.location.href = linkTarget;
    }

    function evaluasiKembaliDariIklan() {
        targetUrlAsli = sessionStorage.getItem('urlAsliDisimpan');
        tampilkanHalamanIklan(); // Pastikan halaman iklan tampil

        const btn = document.getElementById('btnIklan');
        const text = document.getElementById('textIklan');
        const icon = document.getElementById('iconIklan');

        // Ambil waktu awal mula klik
        const waktuKlik = parseInt(sessionStorage.getItem('waktuKlikIklan'));
        if (!waktuKlik) return;

        const durasiPindah = Date.now() - waktuKlik;

        // Cek Apakah dia disana >= 5 Detik?
        if (durasiPindah >= 5000) {
            // BERHASIL 
            sessionStorage.removeItem('waktuKlikIklan');
            sessionStorage.removeItem('tungguIklan'); 
            
            btn.className = 'btn-task done';
            text.innerText = "Terima kasih banyak! ☕";
            icon.innerHTML = '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>';

            // Nyalakan Tombol Link Asli
            const btnUnlock = document.getElementById('btnUnlock');
            btnUnlock.classList.add('active');
            btnUnlock.removeAttribute('disabled');
        } else {
            // GAGAL (< 5 DETIK) -> LANGSUNG EKSEKUSI ANIMASI
            sessionStorage.removeItem('waktuKlikIklan');
            sessionStorage.removeItem('tungguIklan'); 

            btn.className = 'btn-task failed';
            text.innerText = "Yah belum 5 detik, diulang yuk!";
            icon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>';

            // Reset tombol setelah 3 detik agar dibaca & bisa diklik lagi
            setTimeout(() => {
                btn.className = 'btn-task';
                text.innerText = "Klik disini (Wajib 5 Detik)";
                icon.innerHTML = '<path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>';
            }, 3000);
        }
    }

    // ==========================================
    // BUKA LINK ASLI 
    // ==========================================
    function bukaLinkAsli() {
        if (targetUrlAsli) {
            sessionStorage.removeItem('urlAsliDisimpan'); 
            window.location.href = targetUrlAsli;
        }
    }
</script>
</body>
</html>
