<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <!-- LAPIS KEAMANAN ANTI-REFERRER -->
    <meta name="referrer" content="no-referrer">
    <title>Gateway Secure</title>
    <style>
        /* ==========================================
           DESAIN GLOBAL (FULL MODERN)
           ========================================== */
        html {
            height: 100%; width: 100%;
        }
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            color: #111; display: flex; justify-content: center; align-items: center; 
            background-color: #f4f7f6; /* Background abu-abu muda dari awal */
        }
        
        /* Panel Tengah Modern */
        .panel { 
            background: #ffffff; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            border: 1px solid #eaeaea; padding: 35px 30px;
            text-align: center; width: 100%; max-width: 380px; box-sizing: border-box;
            /* Animasi panel naik saat keyboard muncul */
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .panel.keyboard-active { transform: translateY(-15vh); }
        
        h2 { font-size: 24px; font-weight: 800; margin: 0 0 8px 0; }
        p { font-size: 15px; color: #666; margin: 0 0 30px 0; }
        
        /* Input Modern */
        .input-modern { 
            width: 100%; border: 2px solid #e5e7eb; background: #f9fafb; 
            color: #111; border-radius: 12px; font-size: 20px; padding: 15px 0; 
            margin: 15px 0; outline: none; text-align: center; font-family: inherit; font-weight: 600;
            letter-spacing: 2px; transition: all 0.2s; box-sizing: border-box;
        }
        .input-modern::placeholder { color: #d1d5db; letter-spacing: normal; font-weight: 500;}
        .input-modern:focus { border-color: #000; background: #fff; box-shadow: 0 0 0 4px rgba(0,0,0,0.05); }
        
        /* Tombol Utama (Lanjut) */
        .btn-main { 
            background: #000; color: #fff; border: none; padding: 16px; border-radius: 12px;
            font-size: 16px; cursor: pointer; font-weight: bold; width: 100%; 
            transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-main:hover { background: #333; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .btn-main:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; box-shadow: none; transform: none; }

        /* Tombol Saluran WA (di bawah Tombol Lanjut) */
        .btn-wa-channel {
            background: #f0fdf4; color: #16a34a; border: 2px solid #bbf7d0; 
            padding: 12px 20px; border-radius: 12px; font-size: 15px; 
            cursor: pointer; font-family: inherit; width: 100%; font-weight: 700; 
            transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; 
            margin-top: 15px; text-decoration: none; box-sizing: border-box;
        }
        .btn-wa-channel:hover { background: #dcfce7; border-color: #86efac; transform: translateY(-2px); }
        .btn-wa-channel svg { width: 22px; height: 22px; fill: #16a34a; }

        .error { color: #e74c3c; margin-top: 20px; display: none; font-size: 14px; font-weight: 500; }

        /* Tombol Floating Chat Admin */
        .floating-btn-right {
            position: fixed; bottom: 25px; right: 25px;
            background-color: #25D366; color: #fff; border-radius: 50px; padding: 12px 20px; 
            display: flex; align-items: center; gap: 10px; text-decoration: none; 
            font-weight: 700; font-size: 15px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); 
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.3s ease;
            z-index: 9999; white-space: nowrap;
        }
        .floating-btn-right:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 8px 25px rgba(37, 211, 102, 0.6); }
        .floating-btn-right svg { width: 24px; height: 24px; fill: #ffffff; flex-shrink: 0; }
        
        /* Animasi Tombol Chat Admin ikut naik saat keyboard muncul */
        .floating-btn-right.keyboard-active { transform: translateY(-15vh); }
        .floating-btn-right.keyboard-active:hover { transform: translateY(calc(-15vh - 4px)) scale(1.02); }

        /* Responsif HP Kecil */
        @media (max-width: 450px) {
            .floating-btn-right span { display: none; }
            .floating-btn-right { padding: 12px; border-radius: 50%; right: 20px; bottom: 20px; }
        }
    </style>
</head>
<body>

    <!-- PANEL UTAMA (MODERN) -->
    <div id="userPanel" class="panel">
        <h2>Akses Link Terkunci</h2>
        <p>Masukkan password untuk melanjutkan</p>
        
        <input type="text" id="passwordInput" class="input-modern" placeholder="••••••" autocomplete="off" autofocus>
        
        <button onclick="cekLink()" id="btnUser" class="btn-main">Lanjut</button>
        
        <!-- TOMBOL JOIN SALURAN WHATSAPP -->
        <a href="https://whatsapp.com/channel/0029Vb7ppPyCBtxEWJ5f1I0V" target="_blank" class="btn-wa-channel">
            <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
            Join Saluran WhatsApp
        </a>

        <div id="errorMsg" class="error">Password tidak ditemukan.</div>
    </div>

    <!-- TOMBOL CHAT ADMIN (FLOAT KANAN BAWAH) -->
    <a href="https://wa.me/6288221456346" target="_blank" class="floating-btn-right" id="btnChatAdmin">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        <span>Chat Admin</span>
    </a>

    <script>
        // CONFIG LINK IKLAN
        const adUrl = "https://conductivebreeds.com/qv7txv4c1u?key=c7d2434d3ed66645d911fc2e3d0e1bcf";

        // Trik Animasi Keyboard Mobile Fix
        const passInput = document.getElementById('passwordInput');
        const userPanel = document.getElementById('userPanel');
        const btnChatAdmin = document.getElementById('btnChatAdmin');

        passInput.addEventListener('focus', () => {
            userPanel.classList.add('keyboard-active');
            btnChatAdmin.classList.add('keyboard-active'); // Animasi Transisi Smooth akan bekerja di sini
        });
        passInput.addEventListener('blur', () => {
            userPanel.classList.remove('keyboard-active');
            btnChatAdmin.classList.remove('keyboard-active');
        });

        // Anti-Referrer YouTube (Amankan Jejak Web Kamu)
        function openLinkSafely(url) {
            const a = document.createElement('a');
            a.href = url;
            a.target = '_blank';
            a.rel = 'noreferrer noopener'; 
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // FUNGSI UTAMA (Buka link + Iklan)
        async function cekLink() {
            const password = document.getElementById("passwordInput").value.trim();
            const btn = document.getElementById("btnUser");
            const errorMsg = document.getElementById("errorMsg");

            if(!password) return;
            btn.innerText = "Loading..."; btn.disabled = true; errorMsg.style.display = "none";

            try {
                const res = await fetch(`/api/get/${password}`);
                if (res.ok) {
                    const data = await res.json();
                    
                    btn.innerText = "Mengalihkan...";
                    
                    openLinkSafely(data.url);
                    setTimeout(() => { window.location.href = adUrl; }, 500);

                } else {
                    errorMsg.style.display = "block";
                    btn.innerText = "Lanjut"; btn.disabled = false;
                }
            } catch (err) {
                errorMsg.innerText = "Error Jaringan."; errorMsg.style.display = "block";
                btn.innerText = "Lanjut"; btn.disabled = false;
            }
        }

        // Fitur Submit lewat Enter Keyboard
        passInput.addEventListener("keypress", (e) => { 
            if (e.key === "Enter") cekLink(); 
        });

    </script>
</body>
</html>
