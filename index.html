<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Gateway Secure</title>
    <style>
        /* FIX BACKGROUND BELANG */
        html { background-color: #ffffff; transition: background-color 0.5s ease; height: 100%; width: 100%; }
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; background-color: transparent; }

        /* DESAIN MINIMALIS (PASSWORD & ADMIN) */
        .panel { text-align: center; width: 100%; max-width: 350px; padding: 20px; box-sizing: border-box; font-family: "Courier New", Courier, monospace; }
        .minimal-title { margin-bottom: 5px; font-size: 22px; text-transform: lowercase; }
        .input-line { width: 100%; border: none; border-bottom: 2px solid #000; background: transparent; font-size: 20px; padding: 10px 0; margin: 15px 0; outline: none; text-align: center; font-family: inherit; }
        .btn-minimal { background: #000; color: #fff; border: 2px solid #000; padding: 12px 20px; font-size: 16px; cursor: pointer; font-family: inherit; width: 100%; text-transform: uppercase; font-weight: bold; }
        .btn-minimal:disabled { background: #fff; color: #aaa; border-color: #aaa; }

        /* DESAIN MODERN (SUB4UNLOCK) */
        #unlockPanel { font-family: system-ui, -apple-system, sans-serif; background: #ffffff; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); border: 1px solid #eaeaea; padding: 30px 20px; max-width: 380px; width: 90%; box-sizing: border-box; text-align: center; }
        #unlockPanel h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
        #unlockPanel p { font-size: 14px; color: #666; margin-bottom: 25px; }
        .task-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .task-item { background: #fff; border: 2px solid #eee; border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.2s; color: #333; font-weight: 600; text-decoration: none; }
        .task-item.locked { opacity: 0.5; pointer-events: none; background: #f9f9f9; }
        .task-item.completed { border-color: #2ecc71; background: #f0fdf4; pointer-events: none; color: #2ecc71; }
        .task-left { display: flex; align-items: center; gap: 14px; }
        .task-icon { width: 28px; height: 28px; display: flex; align-items: center; }
        .task-icon svg { width: 100%; height: 100%; }
        .status-icon { width: 22px; height: 22px; color: #bbb; }
        .btn-modern { background: #ccc; color: #fff; border: none; padding: 16px; border-radius: 12px; font-size: 16px; width: 100%; font-weight: bold; cursor: not-allowed; transition: 0.3s; }
        .btn-modern.active { background: #000; cursor: pointer; }

        .error { color: #d32f2f; margin-top: 15px; display: none; font-size: 14px; }
        .hidden { display: none !important; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; color: #f39c12; }
    </style>
</head>
<body>

    <!-- USER PANEL (MINIMAL) -->
    <div id="userPanel" class="panel">
        <h2 class="minimal-title">masukkan password</h2>
        <input type="text" id="passwordInput" class="input-line" autocomplete="off" autofocus>
        <button onclick="cekLink()" id="btnUser" class="btn-minimal">Lanjut</button>
        <div id="errorMsg" class="error">password tidak valid.</div>
    </div>

    <!-- UNLOCK PANEL (MODERN) -->
    <div id="unlockPanel" class="panel hidden">
        <h2>Selesaikan Tugas</h2>
        <p>Verifikasi untuk membuka link target.</p>
        <div class="task-container">
            <div id="task1" class="task-item" onclick="startTask(1, 'https://www.youtube.com/@kingbawok?sub_confirmation=1')">
                <div class="task-left">
                    <div class="task-icon"><svg viewBox="0 0 24 24" fill="#ff0000"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></div>
                    <span id="text-task1">Subscribe Channel</span>
                </div>
                <span id="container-status1"><svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></span>
            </div>
            <div id="task2" class="task-item locked" onclick="startTask(2, 'dynamic')">
                <div class="task-left">
                    <div class="task-icon"><svg viewBox="0 0 24 24" fill="#007bff"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg></div>
                    <span id="text-task2">Like & Komen Video</span>
                </div>
                <span id="container-status2"><svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></span>
            </div>
            <div id="task3" class="task-item locked" onclick="startTask(3, 'https://whatsapp.com/channel/0029Vb7ppPyCBtxEWJ5f1I0V')">
                <div class="task-left">
                    <div class="task-icon"><svg viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg></div>
                    <span id="text-task3">Join WhatsApp</span>
                </div>
                <span id="container-status3"><svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></span>
            </div>
        </div>
        <button id="unlockButton" class="btn-modern" onclick="finishUnlock()" disabled>Buka Link Target (0/3)</button>
    </div>

    <!-- ADMIN PANEL (MINIMAL) -->
    <div id="adminPanel" class="panel hidden">
        <h2 class="minimal-title">ADMIN PANEL</h2>
        <input type="password" id="adminAPIKey" class="input-line" placeholder="API KEY">
        <input type="url" id="targetUrl" class="input-line" placeholder="URL ASLI">
        <input type="text" id="customPassword" class="input-line" placeholder="PASSWORD">
        <button onclick="buatLink()" id="btnAdmin" class="btn-minimal">GENERATE</button>
        <div id="resultBox" class="hidden">
            <p style="margin-top:20px;">Berhasil!</p>
            <div id="resultPin" style="font-weight: bold; text-decoration: underline;"></div>
        </div>
    </div>

    <script>
        const videoRotasi = ["https://youtu.be/UHOiZGmsbLs?si=5YUhuR1gX1WEZWTV", "https://youtu.be/falVf97gEeA?si=Mksp3oYVbQWixf-f", "https://youtu.be/XrCTcBM480Y?si=gbkGqNfh6QOcxXwx", "https://youtu.be/R0rCpSS8GNc?si=yddRgAlwbn8BO46E", "https://youtu.be/brZT5GYNKSI?si=UblbTj3utT8zfPE9", "https://youtu.be/u9G5pJhpoJI?si=FEUofy-QRbZs05va", "https://youtu.be/ioC1wHxvbFQ?si=hqcH0fVHrobTsKis", "https://youtu.be/0OCa4I2UkUo?si=8fbCkYbBT_QAPL8D"];
        const adUrl = "https://conductivebreeds.com/qv7txv4c1u?key=c7d2434d3ed66645d911fc2e3d0e1bcf";
        const ADMIN_URL_KEY = "panel-rahasia-gw"; // <--- PINTU MASUK ADMIN

        let finalTargetUrl = '', activeTask = 0, totalCompleted = 0;
        const svgSpinner = `<svg class="status-icon spinner" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>`;
        const svgCheck = `<svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;

        if (window.location.search.includes(ADMIN_URL_KEY)) {
            document.getElementById('userPanel').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
        }

        function openSafe(u) { const a = document.createElement('a'); a.href = u; a.target = '_blank'; a.rel = 'noreferrer noopener'; document.body.appendChild(a); a.click(); document.body.removeChild(a); }

        async function cekLink() {
            const p = document.getElementById("passwordInput").value.trim();
            if(!p) return;
            const btn = document.getElementById("btnUser");
            btn.innerText = "..."; btn.disabled = true;
            try {
                const res = await fetch(`/api/get/${p}`);
                if (res.ok) {
                    const d = await res.json(); finalTargetUrl = d.url;
                    document.getElementById('userPanel').classList.add('hidden');
                    document.getElementById('unlockPanel').classList.remove('hidden');
                    document.documentElement.style.backgroundColor = "#f4f7f6";
                } else { document.getElementById("errorMsg").style.display="block"; btn.innerText="Lanjut"; btn.disabled=false; }
            } catch(e) { btn.disabled=false; }
        }

        function startTask(id, url) {
            if (activeTask !== 0) return; activeTask = id;
            let final = url;
            if (id === 2) {
                let idx = parseInt(localStorage.getItem('savedVideoIndex')) || 0;
                final = videoRotasi[idx % videoRotasi.length];
                localStorage.setItem('savedVideoIndex', idx + 1);
            }
            openSafe(final);
            document.getElementById(`text-task${id}`).innerText = "Menunggu...";
        }

        document.addEventListener("visibilitychange", () => {
            if (!document.hidden && activeTask !== 0) {
                let cur = activeTask; activeTask = 0;
                const cont = document.getElementById(`container-status${cur}`);
                const txt = document.getElementById(`text-task${cur}`);
                cont.innerHTML = svgSpinner; txt.innerText = "Memeriksa...";
                setTimeout(() => {
                    cont.innerHTML = svgCheck; txt.innerText = "Selesai";
                    document.getElementById(`task${cur}`).classList.add('completed');
                    totalCompleted++;
                    const ub = document.getElementById('unlockButton');
                    if(totalCompleted === 3) { ub.disabled=false; ub.classList.add('active'); ub.innerText="Buka Link Target"; }
                    else { ub.innerText = `Buka Link Target (${totalCompleted}/3)`; }
                    if(document.getElementById(`task${cur+1}`)) document.getElementById(`task${cur+1}`).classList.remove('locked');
                }, 3000);
            }
        });

        function finishUnlock() { openSafe(finalTargetUrl); setTimeout(() => { window.location.href = adUrl; }, 500); }

        async function buatLink() {
            const adminKey = document.getElementById("adminAPIKey").value;
            const url = document.getElementById("targetUrl").value.trim();
            const password = document.getElementById("customPassword").value.trim();
            if(!url || !password || !adminKey) return alert("Lengkapi data!");
            const btn = document.getElementById("btnAdmin"); btn.disabled = true;
            try {
                const res = await fetch(`/api/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminKey, url, password })
                });
                if (res.ok) {
                    const d = await res.json();
                    document.getElementById("resultPin").innerText = d.password;
                    document.getElementById("resultBox").classList.remove('hidden');
                } else { alert("Gagal! Cek Kunci API atau Password Duplikat."); }
            } catch(e) { alert("Error!"); }
            btn.disabled = false;
        }
    </script>
</body>
</html>
