<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masukkan Password</title>
    
    <!-- ANTI BOT & ANTI CACHE -->
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <style>
        * { -webkit-tap-highlight-color: transparent !important; outline: none !important; }
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; background-color: #ffffff; font-family: "Courier New", Courier, monospace; color: #000000; -webkit-user-select: none; user-select: none; }
        input { -webkit-user-select: auto; user-select: auto; }

        #page-auth { width: 100%; max-width: 350px; padding: 20px; box-sizing: border-box; text-align: center; transition: transform 0.3s ease-out; }
        #page-auth.keyboard-active { transform: translateY(-25vh); }

        h2.minimal-title { margin-bottom: 5px; font-size: 22px; text-transform: lowercase; cursor: default; }
        
        /* Form input */
        .input-line { width: 100%; border: none; border-bottom: 2px solid #000; background: transparent; font-size: 20px; padding: 10px 0; margin: 15px 0; text-align: center; font-family: inherit; letter-spacing: 3px; }
        
        button.btn-minimal { background: #000; color: #fff; border: 2px solid #000; padding: 14px 20px; font-size: 16px; cursor: pointer; font-family: inherit; width: 100%; text-transform: uppercase; font-weight: bold; transition: 0.2s; }
        button.btn-minimal:disabled { background: #fff; color: #aaa; border-color: #aaa; cursor: not-allowed; }
        
        /* Tombol Opsi Kedua (Putih) */
        button.btn-outline { background: #fff; color: #000; border: 2px solid #000; padding: 14px 20px; font-size: 14px; cursor: pointer; font-family: inherit; width: 100%; text-transform: uppercase; font-weight: bold; transition: 0.2s; }
        button.btn-outline:hover:not(:disabled) { background: #f0f0f0; }
        button.btn-outline:disabled { color: #aaa; border-color: #aaa; cursor: not-allowed; }

        .error { color: #d32f2f; margin-top: 15px; display: none; font-size: 14px; font-family: system-ui, sans-serif; line-height: 1.4; font-weight: 600; }
        
        .divider { margin: 25px 0 20px 0; display: flex; align-items: center; }
        .divider::before, .divider::after { content: ""; flex: 1; border-bottom: 1px dashed #ccc; }
        .divider span { padding: 0 10px; font-size: 12px; color: #888; font-family: system-ui, sans-serif; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="page-auth">
    <h2 class="minimal-title">masukkan password</h2>
    
    <input type="text" id="passwordInput" class="input-line" 
           autocomplete="new-password" 
           autocorrect="off" 
           autocapitalize="off" 
           spellcheck="false" 
           data-lpignore="true">
           
    <button id="btnUser" class="btn-minimal">Lanjut</button>

    <div class="divider"><span>ATAU</span></div>
    
    <button id="btnOuo" class="btn-outline">Lewati via Ouo.io</button>

    <div id="errorMsg" class="error">password tidak valid.</div>
</div>

<script>
    // TANGKAP ID DARI URL (contoh: domain.com/?id=abcde)
    const urlParams = new URLSearchParams(window.location.search);
    const linkId = urlParams.get('id');

    // Jika di URL tidak ada ID, blokir akses
    if (!linkId) {
        document.getElementById("page-auth").innerHTML = "<br><br><span style='color:red; font-family:system-ui; font-weight:bold;'>⚠️ ERROR: Link Tidak Valid / ID Hilang.</span>";
    }

    const passwordInput = document.getElementById("passwordInput");
    const btnUser = document.getElementById("btnUser");
    const btnOuo = document.getElementById("btnOuo");
    const errorMsg = document.getElementById("errorMsg");
    const pageAuth = document.getElementById("page-auth");

    window.addEventListener("pageshow", () => {
        if(passwordInput) passwordInput.value = ""; 
        if(btnUser) { btnUser.innerText = "Lanjut"; btnUser.disabled = false; }
        if(btnOuo) { btnOuo.innerText = "Lewati via Ouo.io"; btnOuo.disabled = false; }
        if(errorMsg) errorMsg.style.display = "none";
        
        sessionStorage.removeItem('secureKey');
        sessionStorage.removeItem('secureId');
        sessionStorage.removeItem('taskDone');
        localStorage.removeItem('isProcessingTask');
    });

    // FUNGSI 1: CEK PASSWORD -> VERIFY.HTML
    async function verifikasiPassword() {
        if (!linkId) return;

        const password = passwordInput.value.trim();
        if (!password) return;
        errorMsg.style.display = "none";
        
        if (["ABC", "ABCD", "BALON"].includes(password.toUpperCase())) {
            gagalVerifikasi("⚠️ Password itu hanyalah contoh, password asli ada di dalam video.");
            return;
        }
        
        btnUser.innerText = "memeriksa...";
        btnUser.disabled = true;
        btnOuo.disabled = true;
        
        try {
            const res = await fetch(`/api/get/${linkId}/${encodeURIComponent(password)}?t=${new Date().getTime()}`, { headers: { 'Cache-Control': 'no-cache' } });
            
            if (res.ok) {
                sessionStorage.setItem('secureId', linkId);
                sessionStorage.setItem('secureKey', password);
                passwordInput.value = ""; 
                window.location.href = "verify.html"; // Lanjut ke halaman tugas 5 detik
            } else {
                gagalVerifikasi("password tidak valid.");
            }
        } catch (err) {
            gagalVerifikasi("error jaringan.");
        }
    }

    // FUNGSI 2: LEWATI VIA OUO.IO (TANPA PASSWORD)
    async function lewatiOuo() {
        if (!linkId) return;
        errorMsg.style.display = "none";
        
        btnOuo.innerText = "MEMBUAT LINK...";
        btnOuo.disabled = true;
        btnUser.disabled = true;

        try {
            const res = await fetch('/api/ouo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: linkId })
            });

            const data = await res.json();
            
            if (res.ok && data.success) {
                // Arahkan langsung ke tab baru (Ouo.io), dan biarkan form ini utuh
                window.location.href = data.link; 
            } else {
                gagalVerifikasi(data.error || "Gagal membuat link Ouo.io");
            }
        } catch (err) {
            gagalVerifikasi("error jaringan.");
        }
    }

    function gagalVerifikasi(pesan) {
        errorMsg.innerText = pesan;
        errorMsg.style.display = "block";
        btnUser.innerText = "Lanjut";
        btnUser.disabled = false;
        btnOuo.innerText = "Lewati via Ouo.io";
        btnOuo.disabled = false;
        passwordInput.value = "";
        passwordInput.focus();
    }

    if(btnUser) btnUser.onclick = verifikasiPassword;
    if(btnOuo) btnOuo.onclick = lewatiOuo;
    
    if(passwordInput) {
        passwordInput.addEventListener("keypress", (e) => { if (e.key === "Enter") verifikasiPassword(); });
        passwordInput.addEventListener('focus', () => pageAuth.classList.add('keyboard-active'));
        passwordInput.addEventListener('blur', () => pageAuth.classList.remove('keyboard-active'));
    }
</script>
</body>
</html>
