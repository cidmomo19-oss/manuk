<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Meta referrer bawaan agar lebih aman -->
    <meta name="referrer" content="no-referrer">
    <title>Gateway Secure</title>
    
    <!-- Font Poppins untuk halaman Sub4Unlock -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* === EFEK TRANSISI HALAMAN ASLI === */
        html { transition: background-color 0.5s ease; height: 100%; width: 100%; }
        html.theme-pw { background-color: #ffffff; }
        html.theme-s4u { background-color: #f4f7f6; }

        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
        }

        /* Tema 1: Halaman Password (Original) */
        body.theme-pw { font-family: "Courier New", Courier, monospace; color: #000000; }
        
        /* Tema 2: Halaman Sub4Unlock (Modern) */
        body.theme-s4u { font-family: 'Poppins', sans-serif; }

        /* Container Pages */
        #page-password { 
            display: block; width: 100%; max-width: 350px; padding: 20px; 
            box-sizing: border-box; text-align: center; 
            transition: transform 0.3s ease-out; /* Animasi asli keyboard */
        }
        #page-sub4unlock { display: none; width: 90%; max-width: 400px; }
        
        /* Animasi form naik saat keyboard muncul (Asli) */
        #page-password.keyboard-active { transform: translateY(-25vh); }

        /* === CSS HALAMAN PASSWORD (ASLI 100%) === */
        h2.minimal-title { margin-bottom: 5px; font-size: 22px; text-transform: lowercase; }
        .input-line { 
            width: 100%; border: none; border-bottom: 2px solid #000; background: transparent; 
            font-size: 20px; padding: 10px 0; margin: 15px 0; outline: none; text-align: center; font-family: inherit; letter-spacing: 3px;
        }
        button.btn-minimal { 
            background: #000; color: #fff; border: 2px solid #000; padding: 14px 20px; font-size: 16px; 
            cursor: pointer; font-family: inherit; width: 100%; text-transform: uppercase; font-weight: bold; transition: 0.2s;
        }
        button.btn-minimal:disabled { background: #fff; color: #aaa; border-color: #aaa; cursor: not-allowed; }
        
        /* Animasi WA Channel Asli dikembalikan */
        .btn-wa-channel {
            display: flex; justify-content: center; align-items: center; gap: 12px; width: 100%;
            margin-top: 15px; padding: 14px 20px; font-family: system-ui, sans-serif; font-size: 16px; font-weight: 600;
            color: #ffffff; text-decoration: none; background: linear-gradient(45deg, #25D366, #128C7E);
            border: none; border-radius: 50px; cursor: pointer; box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); 
            transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
        }
        .btn-wa-channel:hover { transform: translateY(-3px); box-shadow: 0 7px 20px rgba(0, 0, 0, 0.15); }
        .btn-wa-channel svg { width: 22px; height: 22px; fill: #ffffff; }
        
        .error { color: #d32f2f; margin-top: 15px; display: none; font-size: 14px; font-family: system-ui, sans-serif; line-height: 1.4; font-weight: 600; }
        
        /* Animasi WA Melayang Asli dikembalikan */
        .floating-wa {
            position: fixed; bottom: 25px; right: 25px; background-color: #25D366; color: #fff;
            border-radius: 50px; padding: 12px 20px; display: flex; align-items: center; gap: 10px;
            text-decoration: none; font-family: system-ui, sans-serif; font-weight: 700; font-size: 15px; z-index: 9999;
            transition: transform 0.2s ease-out;
        }
        .floating-wa svg { width: 24px; height: 24px; fill: #ffffff; }

        /* === CSS HALAMAN SUB4UNLOCK (MODERN) === */
        .s4u-card {
            background: #ffffff; padding: 30px 20px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center;
        }
        .s4u-header-icon svg { width: 60px; height: 60px; fill: #ff0000; margin-bottom: 10px; }
        .s4u-card h2 { margin: 0 0 10px 0; color: #333; font-size: 22px; }
        .s4u-card p.subtitle { color: #777; font-size: 14px; margin-bottom: 25px; }
        .task-list { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        
        .btn-task {
            display: flex; align-items: center; justify-content: space-between;
            background: #ff0000; color: white; padding: 14px 20px; border-radius: 10px;
            font-weight: 600; font-size: 15px; transition: all 0.3s ease; cursor: pointer; border: none; width: 100%; font-family: inherit;
        }
        .btn-task:hover { background: #cc0000; transform: translateY(-2px); }
        .btn-task svg { width: 24px; height: 24px; fill: white; }
        
        /* Status Tombol Misi */
        .btn-task.checking { background: #f39c12; cursor: wait; pointer-events: none; }
        .btn-task.done { background: #28a745; pointer-events: none; }
        .btn-task.failed { background: #d32f2f; animation: shake 0.4s ease-in-out; }
        .btn-task.disabled { opacity: 0.5; pointer-events: none; background: #999999; }

        .btn-unlock {
            background: #cccccc; color: white; width: 100%; padding: 16px; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 700; cursor: not-allowed; transition: all 0.3s; font-family: inherit;
        }
        .btn-unlock.active { background: #007bff; cursor: pointer; box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4); animation: pulse 2s infinite; }
        .btn-unlock.active:hover { background: #0056b3; transform: translateY(-2px); }
        
        /* Animasi Sub4Unlock */
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(0, 123, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0); } }
        .icon-spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body class="theme-pw">

    document.documentElement.className = "theme-pw";
</script>

<!-- ============================================== -->
<!-- SCRIPT GABUNGAN LOGIKA                         -->
<!-- ============================================== -->
<script>
    // Variabel Simpan URL Asli
    let targetUrlAsli = ""; 

    // Elemen Halaman Password
    const passwordInput = document.getElementById("passwordInput");
    const btnUser = document.getElementById("btnUser");
    const errorMsg = document.getElementById("errorMsg");
    const btnWa = document.getElementById("btnWa"); 
    const pagePassword = document.getElementById("page-password");
    const pageSub4Unlock = document.getElementById("page-sub4unlock");

    window.onload = () => {
        btnUser.onclick = verifikasiPassword;
        passwordInput.focus();
    };

    // ==========================================
    // 1. LOGIKA CEK PASSWORD
    // ==========================================
    async function verifikasiPassword() {
        const password = passwordInput.value.trim();
        if(!password) return;

        errorMsg.style.display = "none";

        const cekPassword = password.toUpperCase();
        if (cekPassword === "ABC" || cekPassword === "ABCD" || cekPassword === "BALON") {
            errorMsg.innerText = "⚠️ Password itu hanyalah contoh, password asli ada di dalam video.";
            errorMsg.style.display = "block";
            passwordInput.value = ""; 
            passwordInput.focus(); 
            return; 
        }

        btnUser.innerText = "memeriksa..."; 
        btnUser.disabled = true; 

        try {
            const waktuSekarang = new Date().getTime();
            const res = await fetch(`/api/get/${password}?t=${waktuSekarang}`, {
                method: 'GET',
                headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate' }
            });
            
            if (res.ok) {
                const data = await res.json();
                targetUrlAsli = data.url; 
                tampilkanSub4Unlock();
            } else {
                errorMsg.innerText = "password tidak valid.";
                errorMsg.style.display = "block";
                btnUser.innerText = "Lanjut"; 
                btnUser.disabled = false;
            }
        } catch (err) {
            errorMsg.innerText = "error jaringan."; 
            errorMsg.style.display = "block";
            btnUser.innerText = "Lanjut"; 
            btnUser.disabled = false;
        }
    }

    function tampilkanSub4Unlock() {
        pagePassword.style.display = "none";
        btnWa.style.display = "none"; 
        
        // Ganti tema secara utuh (background transition)
        document.documentElement.className = "theme-s4u";
        document.body.className = "theme-s4u";
        
        pageSub4Unlock.style.display = "block";
    }

    // ==========================================
    // ANIMASI KEYBOARD ASLI (DIKEMBALIKAN)
    // ==========================================
    passwordInput.addEventListener("keypress", (e) => { 
        if (e.key === "Enter") verifikasiPassword(); 
    });

    passwordInput.addEventListener('focus', () => pagePassword.classList.add('keyboard-active'));
    passwordInput.addEventListener('blur', () => pagePassword.classList.remove('keyboard-active'));

    const handleKeyboardPosition = () => {
        if (!window.visualViewport) return;
        const windowHeight = window.innerHeight;
        const viewportHeight = window.visualViewport.height;
        const keyboardHeight = windowHeight - viewportHeight;
        btnWa.style.transform = (keyboardHeight > 0) ? `translateY(-${keyboardHeight}px)` : 'translateY(0)';
    };

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', handleKeyboardPosition);
    }


    // ==========================================
    // 2. LOGIKA SUB4UNLOCK (USER-FRIENDLY & ANTI LEMOT)
    // ==========================================
    const linkSubscribe = "https://www.youtube.com/@kingbawok";
    const linkVideo = "https://youtu.be/f2vrGhKCyWE?si=3EjSbxel4WKOns5j"; 

    let statusSub = false;
    let statusLikeCom = false;
    
    let tugasAktif = null; 
    let waktuKlikTugas = 0; 
    let userSudahPindahLayar = false;
    let timeoutBatal = null;

    // Deteksi aktivitas pindah tab / buka aplikasi
    document.addEventListener("visibilitychange", () => {
        if (!tugasAktif) return;

        if (document.hidden) {
            // Begitu layar web ini tertutup (berarti YouTube kebuka), catat!
            userSudahPindahLayar = true;
        } else {
            // User KEMBALI ke halaman web kita
            if (userSudahPindahLayar) {
                let durasi = Date.now() - waktuKlikTugas;

                // Abaikan jika ini cuma kedipan layar HP saat loading aplikasi (< 800ms)
                if (durasi < 800) return;

                // Kalau dia udah beneran pindah layar dan balik lagi, LANGSUNG SUKSES.
                // Gak peduli HP dia butuh 2 detik, 5 detik, atau 1 jam.
                clearTimeout(timeoutBatal);
                
                // Kasih animasi "Memeriksa..." selama 1.5 detik biar elegan, lalu Selesai.
                setTimeout(() => {
                    selesaikanTugas(true, "Selesai");
                }, 1500);
            }
        }
    });

    function jalankanTugas(jenis) {
        if (tugasAktif) return;
        if (jenis === 'sub' && statusSub) return;
        if (jenis === 'likecom' && statusLikeCom) return;

        tugasAktif = jenis;
        waktuKlikTugas = Date.now(); 
        userSudahPindahLayar = false;

        const isSub = jenis === 'sub';
        const targetUrl = isSub ? linkSubscribe : linkVideo;

        const btnId = isSub ? 'btnSub' : 'btnLikeCom';
        const textId = isSub ? 'textSub' : 'textLikeCom';
        const iconId = isSub ? 'iconSub' : 'iconLikeCom';
        
        const btn = document.getElementById(btnId);
        const text = document.getElementById(textId);
        const icon = document.getElementById(iconId);
        const otherBtn = document.getElementById(isSub ? 'btnLikeCom' : 'btnSub');

        // Membuka link YouTube dengan aman
        const a = document.createElement('a');
        a.href = targetUrl;
        a.target = '_blank';
        a.rel = 'noreferrer noopener'; 
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a); 

        // Ubah UI jadi Loading "Memeriksa..."
        btn.className = 'btn-task checking';
        text.innerText = "Memeriksa...";
        icon.classList.add('icon-spin');
        icon.innerHTML = '<path d="M12 4V2C6.48 2 2 6.48 2 12h2c0-4.41 3.59-8 8-8z"/>'; 

        // Kunci tombol sebelahnya sementara
        if (!((isSub && statusLikeCom) || (!isSub && statusSub))) {
            otherBtn.classList.add('disabled');
        }

        // SATU-SATUNYA PENYEBAB GAGAL:
        // Kalau tombol diklik, tapi selama 4 detik layar ga pindah-pindah (misal Pop-up diblokir browser)
        timeoutBatal = setTimeout(() => {
            if (!userSudahPindahLayar) {
                selesaikanTugas(false, "Coba Lagi");
            }
        }, 4000); 
    }

    function selesaikanTugas(sukses, pesan) {
        const isSub = tugasAktif === 'sub';
        const btn = document.getElementById(isSub ? 'btnSub' : 'btnLikeCom');
        const text = document.getElementById(isSub ? 'textSub' : 'textLikeCom');
        const icon = document.getElementById(isSub ? 'iconSub' : 'iconLikeCom');
        const otherBtn = document.getElementById(isSub ? 'btnLikeCom' : 'btnSub');

        otherBtn.classList.remove('disabled'); 
        icon.classList.remove('icon-spin');

        if (sukses) {
            btn.className = 'btn-task done';
            text.innerText = pesan;
            icon.innerHTML = '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>';

            if (isSub) statusSub = true; else statusLikeCom = true;
            cekSemuaTugas();
        } else {
            btn.className = 'btn-task failed';
            text.innerText = pesan; 
            if (isSub) {
                icon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>';
            } else {
                icon.innerHTML = '<path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/>';
            }
        }

        tugasAktif = null;
    }

    function cekSemuaTugas() {
        if (statusSub && statusLikeCom) {
            const btnUnlock = document.getElementById('btnUnlock');
            btnUnlock.classList.add('active');
            btnUnlock.removeAttribute('disabled');
        }
    }

    function bukaLinkAsli() {
        if (statusSub && statusLikeCom && targetUrlAsli) {
            const a = document.createElement('a');
            a.href = targetUrlAsli;
            a.target = '_self'; 
            a.rel = 'noreferrer noopener';
            document.body.appendChild(a);
            a.click();
        }
    }
</script>
