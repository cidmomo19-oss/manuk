<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- LAPIS KEAMANAN ANTI-REFERRER -->
    <meta name="referrer" content="no-referrer">
    <title>Gateway Secure</title>
    <style>
        /* ==========================================
           1. DESAIN GLOBAL & MINIMALIS (HALAMAN PASSWORD)
           ========================================== */
        html {
            background-color: #ffffff; 
            transition: background-color 0.5s ease;
            height: 100%; width: 100%;
        }
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            font-family: "Courier New", Courier, monospace; color: #000000; 
            display: flex; justify-content: center; align-items: center; background-color: transparent; 
        }
        .panel { 
            text-align: center; width: 100%; max-width: 350px; padding: 20px; box-sizing: border-box;
            transition: transform 0.3s ease-out, opacity 0.3s ease;
        }
        .panel.keyboard-active { transform: translateY(-25vh); }
        h2.minimal-title { margin-bottom: 5px; font-size: 22px; text-transform: lowercase; }
        p.minimal-sub { font-size: 14px; color: #555; margin-top: 0; }
        
        .input-line { 
            width: 100%; border: none; border-bottom: 2px solid #000; background: transparent; 
            font-size: 20px; padding: 10px 0; margin: 15px 0; outline: none; text-align: center; font-family: inherit;
        }
        #passwordInput { letter-spacing: 3px; }
        .input-line::placeholder { color: #ccc; font-size: 16px; letter-spacing: normal; }
        
        button.btn-minimal { 
            background: #000; color: #fff; border: 2px solid #000; padding: 12px 20px; font-size: 16px; 
            cursor: pointer; font-family: inherit; width: 100%; text-transform: uppercase; font-weight: bold; transition: 0.2s;
        }
        button.btn-minimal:hover { background: #333; }
        button.btn-minimal:disabled { background: #fff; color: #aaa; border-color: #aaa; cursor: not-allowed; }

        .error { color: #d32f2f; margin-top: 15px; display: none; font-size: 14px; }
        .hidden { display: none !important; }

        /* ==========================================
           2. DESAIN MODERN & FULL ANIMASI (HALAMAN SUB4UNLOCK)
           ========================================== */
        #unlockPanel {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #ffffff; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            border: 1px solid #eaeaea; padding: 30px 20px; max-width: 380px; width: 90%; box-sizing: border-box;
        }
        #unlockPanel h2 { margin: 0 0 8px 0; font-size: 22px; font-weight: 800; color: #111; text-transform: none;}
        #unlockPanel p { font-size: 14px; color: #666; margin: 0 0 25px 0; font-weight: 500; }

        .task-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        
        .task-item {
            background: #fff; border: 2px solid #eee; border-radius: 12px; padding: 14px 16px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); color: #333; font-weight: 600;
        }
        .task-item:hover:not(.locked):not(.completed) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .task-item.locked { opacity: 0.5; pointer-events: none; background: #f9f9f9; filter: grayscale(100%); }
        .task-item.completed { border-color: #2ecc71; background: #f0fdf4; pointer-events: none; }
        
        .task-left { display: flex; align-items: center; gap: 14px; }
        .task-icon { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; }
        .task-icon svg { width: 100%; height: 100%; }
        
        .status-icon { width: 22px; height: 22px; color: #bbb; }
        .completed .status-icon, .completed .task-text { color: #2ecc71; }

        #task1:not(.locked):not(.completed) { border-color: #ff0000; }
        #task2:not(.locked):not(.completed) { border-color: #007bff; }
        #task3:not(.locked):not(.completed) { border-color: #25D366; }

        .btn-modern { 
            background: #ccc; color: #fff; border: none; padding: 16px; border-radius: 12px;
            font-size: 16px; cursor: not-allowed; font-weight: bold; width: 100%; 
            transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-modern.active { background: #000; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-modern.active:hover { background: #333; transform: translateY(-2px); }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; color: #f39c12; }

        /* ==========================================
           3. FLOATING BUTTON WHATSAPP (CHAT ADMIN)
           ========================================== */
        .floating-wa {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: #25D366;
            color: #fff;
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-family: system-ui, -apple-system, sans-serif;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 9999;
        }
        .floating-wa:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.6);
        }
        .floating-wa svg {
            width: 24px;
            height: 24px;
            fill: #ffffff;
            flex-shrink: 0;
        }
        /* Responsif untuk HP layarnya sempit biar tulisan panjangnya tetep rapi */
        @media (max-width: 450px) {
            .floating-wa { bottom: 20px; right: 20px; padding: 10px 16px; font-size: 13px; max-width: 65%; }
            .floating-wa svg { width: 22px; height: 22px; }
            .floating-wa span { line-height: 1.2; }
        }
    </style>
</head>
<body>

    <!-- HALAMAN USER (MINIMALIS) -->
    <div id="userPanel" class="panel">
        <h2 class="minimal-title">masukkan password</h2>
        <input type="text" id="passwordInput" class="input-line" autocomplete="off" autofocus>
        <button onclick="cekLink()" id="btnUser" class="btn-minimal">Lanjut</button>
        <div id="errorMsg" class="error">password tidak valid.</div>
    </div>

    <!-- HALAMAN TUGAS (MODERN UI FULL ANIMASI) -->
    <div id="unlockPanel" class="panel hidden">
        <h2>Selesaikan Tugas</h2>
        <p>Verifikasi bahwa Anda adalah manusia.</p>
        
        <div class="task-container">
            <div id="task1" class="task-item" onclick="startTask(1, 'https://www.youtube.com/@kingbawok?sub_confirmation=1')">
                <div class="task-left">
                    <div class="task-icon"><svg viewBox="0 0 24 24" fill="#ff0000"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></div>
                    <span class="task-text" id="text-task1">Subscribe Channel</span>
                </div>
                <span id="container-status1"><svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></span>
            </div>

            <div id="task2" class="task-item locked" onclick="startTask(2, 'https://youtu.be/WcGCmTCaA5I')">
                <div class="task-left">
                    <div class="task-icon"><svg viewBox="0 0 24 24" fill="#007bff"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg></div>
                    <span class="task-text" id="text-task2">Like & Komen Video</span>
                </div>
                <span id="container-status2"><svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></span>
            </div>

            <div id="task3" class="task-item locked" onclick="startTask(3, 'https://whatsapp.com/channel/0029Vb7ppPyCBtxEWJ5f1I0V')">
                <div class="task-left">
                    <div class="task-icon"><svg viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg></div>
                    <span class="task-text" id="text-task3">Join WhatsApp</span>
                </div>
                <span id="container-status3"><svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></span>
            </div>
        </div>

        <button id="unlockButton" class="btn-modern" onclick="finishUnlock()" disabled>
            <svg id="btnIcon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            <span id="btnText">Buka Link Target (0/3)</span>
        </button>
    </div>

    <!-- TOMBOL MELAYANG CHAT ADMIN (Tanpa isi pesan otomatis) -->
    <!-- Linknya murni wa.me/nomor tanpa ada ?text=... -->
    <a href="https://wa.me/6288221456346" target="_blank" class="floating-wa">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        <span>Chat admin jika mengalami masalah</span>
    </a>

    <script>
        // CONFIG SCRIPT
        const adUrl = "https://conductivebreeds.com/qv7txv4c1u?key=c7d2434d3ed66645d911fc2e3d0e1bcf";
        let finalTargetUrl = '';
        let activeTask = 0;
        let totalCompleted = 0;

        // SVG Icons
        const svgSpinner = `<svg class="status-icon spinner" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>`;
        const svgCheck = `<svg class="status-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
        const svgUnlock = `<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path></svg>`;

        // Script keyboard mobile fix
        document.querySelectorAll('.input-line').forEach(input => {
            input.addEventListener('focus', (e) => e.target.closest('.panel')?.classList.add('keyboard-active'));
            input.addEventListener('blur', (e) => e.target.closest('.panel')?.classList.remove('keyboard-active'));
        });

        // Anti-Referrer
        function openLinkSafely(url) {
            const a = document.createElement('a');
            a.href = url;
            a.target = '_blank';
            a.rel = 'noreferrer noopener'; 
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        async function cekLink() {
            const password = document.getElementById("passwordInput").value.trim();
            const btn = document.getElementById("btnUser");
            const errorMsg = document.getElementById("errorMsg");

            if(!password) return;
            btn.innerText = "loading..."; btn.disabled = true; errorMsg.style.display = "none";

            try {
                const res = await fetch(`/api/get/${password}`);
                if (res.ok) {
                    const data = await res.json();
                    finalTargetUrl = data.url; 
                    
                    document.getElementById('userPanel').classList.add('hidden');
                    document.getElementById('unlockPanel').classList.remove('hidden');
                    
                    // Transisi background smooth ke abu-abu muda
                    document.documentElement.style.backgroundColor = "#f4f7f6"; 
                } else {
                    errorMsg.style.display = "block";
                    btn.innerText = "lanjut"; btn.disabled = false;
                }
            } catch (err) {
                errorMsg.innerText = "error jaringan."; errorMsg.style.display = "block";
                btn.innerText = "lanjut"; btn.disabled = false;
            }
        }
        document.getElementById("passwordInput").addEventListener("keypress", (e) => { if (e.key === "Enter") cekLink(); });

        function startTask(taskId, url) {
            if (activeTask !== 0) return; 

            activeTask = taskId;
            openLinkSafely(url); 
            document.getElementById(`text-task${taskId}`).innerText = "Menunggu aksi...";
        }

        document.addEventListener("visibilitychange", () => {
            if (!document.hidden && activeTask !== 0) {
                let currentTask = activeTask;
                activeTask = 0; 
                verifyTask(currentTask);
            }
        });

        function verifyTask(taskId) {
            const elContainer = document.getElementById(`container-status${taskId}`);
            const elText = document.getElementById(`text-task${taskId}`);
            
            elContainer.innerHTML = svgSpinner;
            elText.innerText = "Memeriksa...";

            setTimeout(() => {
                elContainer.innerHTML = svgCheck;
                elText.innerText = "Selesai";
                document.getElementById(`task${taskId}`).classList.add('completed');
                
                totalCompleted++;

                const unlockBtn = document.getElementById('unlockButton');
                const btnText = document.getElementById('btnText');
                
                if (totalCompleted === 3) {
                    unlockBtn.disabled = false;
                    unlockBtn.classList.add('active'); 
                    btnText.innerText = "Dapatkan Link Asli";
                    // Ganti icon gembok tertutup jadi gembok kebuka
                    document.getElementById('btnIcon').outerHTML = svgUnlock.replace('<svg', '<svg id="btnIcon"');
                } else {
                    btnText.innerText = `Buka Link Target (${totalCompleted}/3)`;
                }

                const nextTask = taskId + 1;
                const nextBtn = document.getElementById(`task${nextTask}`);
                if (nextBtn) nextBtn.classList.remove('locked');

            }, 3000); 
        }

        function finishUnlock() {
            const btn = document.getElementById('unlockButton');
            document.getElementById('btnText').innerText = "Mengalihkan...";
            btn.classList.remove('active');
            btn.disabled = true;

            openLinkSafely(finalTargetUrl);
            setTimeout(() => { window.location.href = adUrl; }, 500);
        }
    </script>
</body>
</html>
