<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PENTING: Lapis 1 Anti-Referrer -->
    <meta name="referrer" content="no-referrer">
    <title>Gateway</title>
    <style>
        /* KEMBALI KE DESAIN MINIMALIS CATBOX */
        html, body { 
            height: 100%; overflow: hidden; font-family: "Courier New", Courier, monospace; 
            background-color: #ffffff; color: #000000; margin: 0; display: flex;
            justify-content: center; align-items: center;
        }
        .panel { 
            text-align: center; width: 100%; max-width: 350px; padding: 20px; 
            transition: transform 0.3s ease-out;
        }
        .panel.keyboard-active { transform: translateY(-25vh); }
        h2 { margin-bottom: 5px; font-size: 22px; text-transform: lowercase; }
        p { font-size: 14px; color: #555; margin-top: 0; }
        
        /* Input Cuma Garis */
        .input-line { 
            width: 100%; border: none; border-bottom: 2px solid #000; background: transparent; 
            font-size: 20px; padding: 10px 0; margin: 15px 0; outline: none; 
            text-align: center; font-family: inherit;
        }
        #passwordInput { letter-spacing: 3px; }
        .input-line::placeholder { color: #ccc; font-size: 16px; letter-spacing: normal; }
        
        /* Tombol Polos Hitam */
        button { 
            background: #000; color: #fff; border: 2px solid #000; padding: 12px 20px; font-size: 16px; 
            cursor: pointer; font-family: inherit; width: 100%; text-transform: uppercase; 
            font-weight: bold; transition: 0.2s;
        }
        button:hover { background: #333; }
        button:disabled { background: #fff; color: #aaa; border-color: #aaa; cursor: not-allowed; }

        .error { color: #d32f2f; margin-top: 15px; display: none; font-size: 14px; }
        .hidden { display: none !important; }
        .result { margin-top: 30px; font-size: 32px; font-weight: bold; text-decoration: underline; }

        /* Sub4Unlock Style Minimalis */
        .task-list { display: flex; flex-direction: column; gap: 10px; margin: 25px 0; }
        .task-btn {
            background: #fff; color: #000; text-transform: lowercase; font-weight: normal;
            border: 2px solid #000; text-align: left; padding: 12px 15px; font-size: 15px;
        }
        .task-btn:hover:not(:disabled) { background: #f0f0f0; }
        .task-btn.completed { background: #000; color: #fff; border-color: #000; text-decoration: line-through; }
        
        /* Animasi kedip saat memeriksa */
        @keyframes blink { 50% { opacity: 0.5; } }
        .verifying { animation: blink 1s linear infinite; font-style: italic; }
    </style>
</head>
<body>

    <!-- HALAMAN USER -->
    <div id="userPanel" class="panel">
        <h2>masukkan password</h2>
        <input type="text" id="passwordInput" class="input-line" autocomplete="off" autofocus>
        <button onclick="cekLink()" id="btnUser">Lanjut</button>
        <div id="errorMsg" class="error">password tidak valid.</div>
    </div>

    <!-- HALAMAN TUGAS (SUB4UNLOCK) -->
    <div id="unlockPanel" class="panel hidden">
        <h2>selesaikan tugas</h2>
        <p>klik secara berurutan.</p>
        
        <div class="task-list">
            <button id="task1" class="task-btn" onclick="startTask(1, 'https://www.youtube.com/@kingbawok?sub_confirmation=1')">[1] subscribe channel</button>
            <button id="task2" class="task-btn" onclick="startTask(2, 'https://youtu.be/XrCTcBM480Y')" disabled>[2] like video</button>
            <button id="task3" class="task-btn" onclick="startTask(3, 'https://whatsapp.com/channel/0029Vb7ppPyCBtxEWJ5f1I0V')" disabled>[3] join whatsapp</button>
        </div>

        <button id="unlockButton" onclick="finishUnlock()" disabled>buka link (0/3)</button>
    </div>

    <!-- HALAMAN ADMIN -->
    <div id="adminPanel" class="panel hidden">
        <h2>tambah link</h2>
        <input type="url" id="targetUrl" class="input-line" placeholder="url asli">
        <input type="text" id="customPassword" class="input-line" placeholder="password custom">
        <button onclick="buatLink()" id="btnAdmin">Generate</button>
        
        <div id="resultBox" class="hidden">
            <p style="margin-top:30px; margin-bottom: 0;">password custom:</p>
            <div id="resultPin" class="result"></div>
        </div>
    </div>

    <script>
        // Setup Awal
        let finalTargetUrl = '';
        const adUrl = "https://conductivebreeds.com/qv7txv4c1u?key=c7d2434d3ed66645d911fc2e3d0e1bcf";
        let activeTask = 0;
        let totalCompleted = 0;

        // Cek URL admin
        if (window.location.search.includes('admin')) {
            document.getElementById('userPanel').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
        }

        // Script keyboard mobile
        document.querySelectorAll('.input-line').forEach(input => {
            input.addEventListener('focus', (e) => e.target.closest('.panel')?.classList.add('keyboard-active'));
            input.addEventListener('blur', (e) => e.target.closest('.panel')?.classList.remove('keyboard-active'));
        });

        // ==========================================
        // FUNGSI ANTI-REFERRER (AMANKAN YOUTUBE)
        // ==========================================
        function openLinkSafely(url) {
            // Lapis 2: Buat elemen <a> bayangan dengan atribut noreferrer
            const a = document.createElement('a');
            a.href = url;
            a.target = '_blank';
            a.rel = 'noreferrer noopener'; // Menghapus jejak domain kamu
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // ==========================================
        // LOGIKA USER & PASSWORD
        // ==========================================
        async function cekLink() {
            const password = document.getElementById("passwordInput").value.trim();
            const btn = document.getElementById("btnUser");
            const errorMsg = document.getElementById("errorMsg");

            if(!password) return;
            btn.innerText = "loading..."; btn.disabled = true; errorMsg.style.display = "none";

            try {
                const res = await fetch(`/api/get/${password}`);
                if (res.ok) {
                    const data = await res.json();
                    finalTargetUrl = data.url; 
                    document.getElementById('userPanel').classList.add('hidden');
                    document.getElementById('unlockPanel').classList.remove('hidden');
                } else {
                    errorMsg.style.display = "block";
                    btn.innerText = "lanjut"; btn.disabled = false;
                }
            } catch (err) {
                errorMsg.innerText = "error jaringan."; errorMsg.style.display = "block";
                btn.innerText = "lanjut"; btn.disabled = false;
            }
        }
        document.getElementById("passwordInput").addEventListener("keypress", (e) => { if (e.key === "Enter") cekLink(); });

        // ==========================================
        // LOGIKA SUB4UNLOCK (SIMULASI DELAY)
        // ==========================================
        function startTask(taskId, url) {
            if (activeTask !== 0) return; // Cegah klik ganda

            activeTask = taskId;
            openLinkSafely(url); // Buka tanpa referrer
            
            const btn = document.getElementById(`task${taskId}`);
            btn.innerText = `[.] menunggu aksi...`;
        }

        // Deteksi user balik ke web
        document.addEventListener("visibilitychange", () => {
            if (!document.hidden && activeTask !== 0) {
                verifyTask(activeTask);
            }
        });

        function verifyTask(taskId) {
            const btn = document.getElementById(`task${taskId}`);
            
            // 1. Ubah tulisan jadi memeriksa
            btn.innerText = `[.] memeriksa...`;
            btn.classList.add('verifying');

            // 2. Delay 3 detik biar kelihatan kayak sistem pro / aman dari ban YouTube
            setTimeout(() => {
                // Selesai memeriksa
                btn.classList.remove('verifying');
                btn.classList.add('completed');
                btn.innerText = `[✓] selesai`;
                btn.disabled = true;

                totalCompleted++;
                activeTask = 0;

                // Update tombol Buka Link
                const unlockBtn = document.getElementById('unlockButton');
                if (totalCompleted === 3) {
                    unlockBtn.disabled = false;
                    unlockBtn.innerText = "buka link target";
                } else {
                    unlockBtn.innerText = `buka link (${totalCompleted}/3)`;
                }

                // Buka tugas berikutnya
                const nextTask = taskId + 1;
                const nextBtn = document.getElementById(`task${nextTask}`);
                if (nextBtn) nextBtn.disabled = false;

            }, 3000); // Waktu 3 detik
        }

        // ==========================================
        // FUNGSI AKHIR (BUKA LINK ASLI & IKLAN)
        // ==========================================
        function finishUnlock() {
            const btn = document.getElementById('unlockButton');
            btn.innerText = "redirecting...";
            btn.disabled = true;

            // Buka link target dengan aman (No Referrer)
            openLinkSafely(finalTargetUrl);
            
            // Tab saat ini jadi iklan
            setTimeout(() => { window.location.href = adUrl; }, 500);
        }

        // ==========================================
        // LOGIKA ADMIN
        // ==========================================
        async function buatLink() {
            const targetUrl = document.getElementById("targetUrl").value.trim();
            const customPassword = document.getElementById("customPassword").value.trim();
            const btn = document.getElementById("btnAdmin");
            const resultBox = document.getElementById("resultBox");

            if (!targetUrl || !customPassword) return;
            btn.innerText = "loading..."; btn.disabled = true;

            try {
                const res = await fetch(`/api/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: targetUrl, password: customPassword })
                });

                if (res.ok) {
                    const data = await res.json();
                    document.getElementById("resultPin").innerText = data.password;
                    resultBox.classList.remove('hidden');
                    document.getElementById("targetUrl").value = ""; 
                    document.getElementById("customPassword").value = ""; 
                } else if (res.status === 409) {
                    alert("error: password terpakai.");
                } else {
                    alert("gagal membuat link.");
                }
            } catch (err) { alert("error jaringan."); }
            
            btn.innerText = "generate"; btn.disabled = false;
        }
        document.getElementById("customPassword").addEventListener("keypress", (e) => { if (e.key === "Enter") buatLink(); });
    </script>
</body>
</html>
