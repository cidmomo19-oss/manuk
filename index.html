<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masukkan Password</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; background-color: #ffffff; font-family: "Courier New", Courier, monospace; color: #000000; }
        #page-auth { width: 100%; max-width: 350px; padding: 20px; text-align: center; }
        h2 { font-size: 22px; text-transform: lowercase; margin-bottom: 20px; }
        .input-line { width: 100%; border: none; border-bottom: 2px solid #000; background: transparent; font-size: 20px; padding: 10px 0; margin-bottom: 20px; text-align: center; font-family: inherit; letter-spacing: 3px; }
        button { background: #000; color: #fff; border: 2px solid #000; padding: 14px; font-size: 16px; cursor: pointer; font-family: inherit; width: 100%; text-transform: uppercase; font-weight: bold; transition: 0.2s; }
        button:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }
        .error { color: #d32f2f; margin-top: 15px; font-size: 14px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div id="page-auth">
    <h2 id="title">memeriksa link...</h2>
    
    <div id="form-area" style="display:none;">
        <input type="text" id="passwordInput" class="input-line" placeholder="PASSWORD" autocomplete="off" spellcheck="false">
        <button id="btnUser">Lanjut</button>
        <div id="errorMsg" class="error"></div>
    </div>
</div>

<script>
    const path = window.location.pathname.split("/").filter(Boolean);
    const linkId = path[0]; 

    const title = document.getElementById("title");
    const formArea = document.getElementById("form-area");
    const passwordInput = document.getElementById("passwordInput");
    const btnUser = document.getElementById("btnUser");
    const errorMsg = document.getElementById("errorMsg");

    // Jalankan saat load
    window.onload = () => {
        if (!linkId || linkId === "index.html") {
            title.innerText = "Link Tidak Valid";
        } else {
            title.innerText = "masukkan password";
            formArea.style.display = "block";
            sessionStorage.clear(); // Bersihkan sisa sesi lama
        }
    };

    async function verifikasi() {
        const pass = passwordInput.value.trim();
        if (!pass) return;

        btnUser.innerText = "MEMERIKSA...";
        btnUser.disabled = true;
        errorMsg.style.display = "none";

        try {
            const res = await fetch('/api/verify-pass', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: linkId, password: pass })
            });

            if (res.ok) {
                // Simpan ID dan Pass ke Session agar verify.html bisa ambil
                sessionStorage.setItem('current_id', linkId);
                sessionStorage.setItem('secureKey', pass); 
                window.location.href = "verify.html";
            } else {
                const data = await res.json();
                errorMsg.innerText = data.msg || "Password salah.";
                errorMsg.style.display = "block";
                btnUser.innerText = "Lanjut";
                btnUser.disabled = false;
                passwordInput.value = "";
            }
        } catch (err) {
            errorMsg.innerText = "Kesalahan koneksi.";
            errorMsg.style.display = "block";
            btnUser.disabled = false;
        }
    }

    btnUser.onclick = verifikasi;
    passwordInput.onkeypress = (e) => { if(e.key === "Enter") verifikasi(); };
</script>
</body>
</html>
