<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Telah Dipindahkan</title>
    <!-- Mengambil font keren dari Google -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            /* Background gradasi animasi */
            background: linear-gradient(-45deg, #128C7E, #25D366, #075E54, #20B2AA);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Animasi pergerakan background */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Kotak konten gaya Glassmorphism */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            /* Animasi masuk */
            animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Lingkaran Ikon */
        .icon-wrapper {
            width: 90px;
            height: 90px;
            background: #e8f9f0;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.3);
        }

        .icon-wrapper svg {
            width: 50px;
            height: 50px;
        }

        h1 {
            color: #1e293b;
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.message {
            color: #475569;
            font-size: 16px;
            line-height: 1.7;
            margin-bottom: 35px;
            font-weight: 400;
        }

        p.message b {
            color: #0f172a;
            font-weight: 600;
        }

        /* Tombol Premium */
        .btn-wa {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            text-decoration: none;
            padding: 16px 30px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 50px;
            width: 100%;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            /* Efek glowing/berkedip lambat */
            animation: pulse 2s infinite;
        }

        .btn-wa:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(37, 211, 102, 0.5);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* Ikon panah dalam tombol */
        .btn-wa svg {
            width: 20px;
            height: 20px;
            fill: white;
            transition: transform 0.3s ease;
        }

        .btn-wa:hover svg {
            transform: translateX(5px);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #94a3b8;
        }

    </style>
</head>
<body>

    <div class="card">
        <div class="icon-wrapper">
            <!-- Ikon Peringatan/Info -->
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="#25D366" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 16V12" stroke="#25D366" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 8H12.01" stroke="#25D366" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <h1>Pemberitahuan</h1>
        
        <p class="message">
            Semua link yang ada di sini <b>telah dipindahkan sepenuhnya</b> ke Saluran WhatsApp kami. <br><br>
            Silakan bergabung ke saluran untuk mendapatkan akses link tersebut.
        </p>

        <!-- Tombol Menuju WhatsApp Anda -->
        <a href="https://whatsapp.com/channel/0029Vb7ppPyCBtxEWJ5f1I0V" class="btn-wa">
            Menuju Saluran WhatsApp
            <!-- Ikon Panah Kanan -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>

        <div class="footer-text">Aman & Terenkripsi oleh WhatsApp</div>
    </div>

</body>
</html>
